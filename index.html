// ─── DRIVE STORAGE ────────────────────────────────────────────────────────────
const DriveDB = {
  token: null, fileIds: {}, cache: {},
  setToken(t) { this.token = t; },

  async req(url, opts = {}) {
    const res = await fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${this.token}`, ...(opts.headers || {}) }
    });
    if (res.status === 401) throw new Error('TOKEN_EXPIRED');
    return res;
  },

  async getFileId(name) {
    if (this.fileIds[name]) return this.fileIds[name];
    const r = await this.req(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${name}'&fields=files(id)`
    );
    const d = await r.json();
    if (d.files && d.files[0]) { this.fileIds[name] = d.files[0].id; return d.files[0].id; }
    return null;
  },

  async get(name) {
    if (this.cache[name] !== undefined) return this.cache[name];
    const id = await this.getFileId(name);
    if (!id) { this.cache[name] = null; return null; }
    const r = await this.req(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
    const data = await r.json();
    this.cache[name] = data;
    return data;
  },

  onTokenExpired: null, // callback to trigger re-auth

  async set(name, data) {
    this.cache[name] = data;
    const body = JSON.stringify(data);
    try {
      const id = await this.getFileId(name);
      if (id) {
        const r = await this.req(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body,
        });
        if (!r.ok) throw new Error(`Save failed: ${r.status}`);
      } else {
        const bnd = 'cadencebnd';
        const meta = JSON.stringify({ name, parents: ['appDataFolder'] });
        const mp = `--${bnd}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${bnd}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${bnd}--`;
        const r = await this.req(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`, {
          method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${bnd}` }, body: mp,
        });
        if (!r.ok) throw new Error(`Create failed: ${r.status}`);
        const f = await r.json();
        this.fileIds[name] = f.id;
      }
      // Signal successful save
      if (this.onSaveSuccess) this.onSaveSuccess();
    } catch(e) {
      console.error('Drive save error:', e);
      if (this.onSaveError) this.onSaveError(e.message);
      throw e;
    }
  },

  // Pending saves queue for when token expires mid-session
  pendingSaves: {},
  queueSave(name, data) {
    this.pendingSaves[name] = data;
  },
  async flushPendingSaves() {
    for (const [name, data] of Object.entries(this.pendingSaves)) {
      await this.set(name, data);
    }
    this.pendingSaves = {};
  },
};

// ─── STORAGE HOOK ─────────────────────────────────────────────────────────────
function useStorage(key, defaultVal) {
  const [val, setVal] = useState(defaultVal);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        let data = await DriveDB.get(key + '.json');
        if (data !== null && data !== undefined) {
          if (key === 'pm_items' && Array.isArray(data))
            data = data.map(i => i.category === 'technique_jazz' ? { ...i, category: 'langage_musical' } : i);
          if (key === 'pm_sessions' && Array.isArray(data))
            data = data.map(s => ({ ...s, blocks: Array.isArray(s.blocks) ? s.blocks.map(b => b.category === 'technique_jazz' ? { ...b, category: 'langage_musical' } : b) : s.blocks }));
          setVal(data);
        }
      } catch(e) { console.error('Drive read:', e); }
      setLoaded(true);
    })();
  }, []);

  const save = useCallback((updater) => {
    setVal(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      DriveDB.set(key + '.json', next).catch(err => {
        console.error('Save error:', err);
        // Queue for retry
        DriveDB.queueSave(key + '.json', next);
      });
      return next;
    });
  }, [key]);

  return [val, save, loaded];
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function toDateStr(d) { return (d || new Date()).toISOString().slice(0, 10); }
function getWeekKey(date, weekStartDay = 4) {
  const d = new Date(date || new Date()); d.setHours(0,0,0,0);
  const day = d.getDay();
  let diff = day - weekStartDay;
  if (diff < 0) diff += 7;
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0, 10);
}

function getWeekDays(weekStartDay = 4) {
  // Returns array of dateStr for the current week
  const start = new Date(getWeekKey(new Date(), weekStartDay) + 'T12:00:00');
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start); d.setDate(d.getDate() + i);
    return d.toISOString().slice(0, 10);
  });
}

// Calculate catchup minutes for today based on missed days this week
function calculateCatchup(sessions, settings, dateStr) {
  const weekStartDay = settings.weekStartDay ?? 4;
  const weekKey = getWeekKey(new Date(dateStr), weekStartDay);
  const weekStart = new Date(weekKey + 'T12:00:00');

  // Get all days of the week up to (not including) today
  const today = new Date(dateStr + 'T12:00:00');
  const pastDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    if (d < today) pastDays.push(d.toISOString().slice(0, 10));
  }

  // Count missed days (no session, not off, not joker, not alternatif)
  const EXEMPT_TYPES = ['off', 'alternatif'];
  let missedDays = 0;
  for (const ds of pastDays) {
    const s = sessions.find(s => s.date === ds);
    if (!s || (!s.validated && !s.joker && !EXEMPT_TYPES.includes(s.type))) {
      missedDays++;
    }
  }

  // Cap at 5 consecutive missed days
  missedDays = Math.min(missedDays, 5);
  if (missedDays === 0) return 0;

  // Total debt = missed * (1/3 of daily target ~30min = 10min)
  const dailyDebt = Math.round((settings.gammesDailyMin || 8) +
    Math.round((settings.techJazzWeeklyMin || 35) / (settings.workDaysPerWeek || 6)) +
    10); // ~25min base, 1/3 ≈ 8-10min
  const totalDebt = missedDays * Math.round(dailyDebt / 3);

  // Remaining days in week including today
  const remainingDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    const ds = d.toISOString().slice(0, 10);
    if (ds >= dateStr) remainingDays.push(ds);
  }

  // Spread debt over remaining days
  return remainingDays.length > 0 ? Math.round(totalDebt / remainingDays.length) : 0;
}
const TODAY = toDateStr();

function compressImage(file, maxW = 1200, q = 0.75) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const r = Math.min(1, maxW / img.width);
        canvas.width = Math.round(img.width * r); canvas.height = Math.round(img.height * r);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL('image/jpeg', q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── ALGORITHM ───────────────────────────────────────────────────────────────
function pickItem(items, dateStr, maxDaysUnseen) {
  if (!items.length) return null;
  const mdu = maxDaysUnseen || MAX_DAYS_UNSEEN;
  const weights = items.map(item => {
    const freq = item.frequency || 'normal';
    const daysSince = item.lastWorked
      ? Math.floor((new Date(dateStr) - new Date(item.lastWorked)) / 86400000) : 999;
    if (daysSince >= mdu[freq]) return 999;
    return FREQUENCY_WEIGHT[freq] * ((MASTERY[item.mastery] || MASTERY.fragile).weight) * Math.min(daysSince + 1, 10);
  });
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) { r -= weights[i]; if (r <= 0) return items[i]; }
  return items[items.length - 1];
}

function isRevisionDay(dateStr, revDays, sessions) {
  const wk = getWeekKey(new Date(dateStr));
  return sessions.filter(s => s.weekKey === wk && s.hasRevision && s.date !== dateStr).length < revDays;
}

function generateSession(items, settings, sessions, dateStr) {
  const maxDaysUnseen = {
    priority: settings.maxDaysUnseenPriority || MAX_DAYS_UNSEEN.priority,
    normal:   settings.maxDaysUnseenNormal   || MAX_DAYS_UNSEEN.normal,
    occasional: settings.maxDaysUnseenOccasional || MAX_DAYS_UNSEEN.occasional,
  };
  const sessionCap = settings.sessionCapMin || SESSION_MAX_MIN;
  const catchupMin = calculateCatchup(sessions, settings, dateStr);
  const hasCatchup = catchupMin > 0;
  const blocks = [];
  const gamme = pickItem(items.filter(i => i.category === 'gammes' && i.isActive && !i.isGroup && !i.paused), dateStr, maxDaysUnseen);
  if (gamme) {
    const gammeFamily = gamme.parentId ? items.find(i => i.id === gamme.parentId) : null;
    blocks.push({ itemId: gamme.id, title: gamme.title, category: 'gammes', plannedMin: settings.gammesDailyMin, validated: false, familyName: gammeFamily?.title || null });
  }

  const lang = pickItem(items.filter(i => i.category === 'langage_musical' && i.isActive && !i.isGroup && !i.paused), dateStr, maxDaysUnseen);
  if (lang) {
    const langFamily = lang.parentId ? items.find(i => i.id === lang.parentId) : null;
    blocks.push({ itemId: lang.id, title: lang.title, category: 'langage_musical', plannedMin: Math.round(settings.techJazzWeeklyMin / settings.workDaysPerWeek), validated: false, familyName: langFamily?.title || null });
  }

  const morceau = pickItem(items.filter(i => i.category === 'morceau' && i.isActive && !i.isGroup && !i.paused), dateStr, maxDaysUnseen);
  if (morceau) {
    const morceauFamily = morceau.parentId ? items.find(i => i.id === morceau.parentId) : null;
    blocks.push({ itemId: morceau.id, title: morceau.title, category: 'morceau', plannedMin: (MASTERY[morceau.mastery] || MASTERY.fragile).timeMin, validated: false, familyName: morceauFamily ? morceauFamily.title : null });
  }

  const doRevision = isRevisionDay(dateStr, settings.revisionDaysPerWeek, sessions);
  if (doRevision) {
    const rev = [...items.filter(i => i.category === 'morceau' && !i.isActive && !i.isGroup && !i.paused)]
      .sort((a,b) => (a.lastRevised ? new Date(a.lastRevised) : new Date(0)) - (b.lastRevised ? new Date(b.lastRevised) : new Date(0)))[0];
    if (rev) blocks.push({ itemId: rev.id, title: rev.title, category: 'revision', plannedMin: Math.round(settings.revisionsWeeklyMin / settings.revisionDaysPerWeek), validated: false });
  }

  let totalMin = blocks.reduce((a,b) => a+b.plannedMin, 0);

  // Apply session cap only when no catchup
  if (!hasCatchup && totalMin > sessionCap) {
    const excess = totalMin - sessionCap;
    const scalable = blocks.filter(b => b.category !== 'gammes');
    const scalableTotal = scalable.reduce((a,b) => a+b.plannedMin, 0);
    if (scalableTotal > 0) scalable.forEach(b => { b.plannedMin = Math.max(5, Math.round(b.plannedMin * (1 - excess / scalableTotal))); });
    totalMin = blocks.reduce((a,b) => a+b.plannedMin, 0);
  }

  // Add catchup: extra item + spread remaining time
  if (hasCatchup) {
    const usedIds = new Set(blocks.map(b => b.itemId));

    // Try 2nd morceau first, then 2nd langage musical, then 2nd gamme
    const extraCandidates = [
      ...items.filter(i => i.category==='morceau' && i.isActive && !i.isGroup && !i.paused && !usedIds.has(i.id)),
      ...items.filter(i => i.category==='langage_musical' && i.isActive && !i.isGroup && !i.paused && !usedIds.has(i.id)),
      ...items.filter(i => i.category==='gammes' && i.isActive && !i.isGroup && !i.paused && !usedIds.has(i.id)),
    ];
    const extraPools = [
      items.filter(i => i.category==='morceau' && i.isActive && !i.isGroup && !i.paused && !usedIds.has(i.id)),
      items.filter(i => i.category==='langage_musical' && i.isActive && !i.isGroup && !i.paused && !usedIds.has(i.id)),
      items.filter(i => i.category==='gammes' && i.isActive && !i.isGroup && !i.paused && !usedIds.has(i.id)),
    ];

    let extraItem = null;
    for (const pool of extraPools) {
      extraItem = pickItem(pool, dateStr, maxDaysUnseen);
      if (extraItem) break;
    }

    const catchupBlockMin = Math.round(catchupMin * 0.6);
    const catchupSpreadMin = catchupMin - catchupBlockMin;

    if (extraItem) {
      const extraFamily = extraItem.parentId ? items.find(i => i.id === extraItem.parentId) : null;
      blocks.push({
        itemId: extraItem.id, title: extraItem.title, category: extraItem.category,
        plannedMin: catchupBlockMin, validated: false,
        familyName: extraFamily ? extraFamily.title : null, isCatchup: true
      });
    }

    // Spread remaining catchup time on existing non-gammes blocks
    const spreadBlocks = blocks.filter(b => !b.isCatchup && b.category !== 'gammes');
    if (spreadBlocks.length > 0) {
      const extra = Math.round(catchupSpreadMin / spreadBlocks.length);
      spreadBlocks.forEach(b => { b.plannedMin += extra; });
    }

    totalMin = blocks.reduce((a,b) => a+b.plannedMin, 0);
  }

  const weekStartDay = settings.weekStartDay ?? 4;
  return { blocks, totalMin, weekKey: getWeekKey(new Date(dateStr), weekStartDay), hasRevision: doRevision, catchupMin: hasCatchup ? catchupMin : 0 };
}

// ─── TIMER HOOK ──────────────────────────────────────────────────────────────
function useTimer(plannedMin) {
  const [secondsLeft, setSecondsLeft] = useState(plannedMin * 60);
  const [running, setRunning] = useState(false);
  const [finished, setFinished] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    setSecondsLeft(plannedMin * 60);
    setRunning(false);
    setFinished(false);
  }, [plannedMin]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setSecondsLeft(s => {
          if (s <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            setFinished(true);
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const toggle = () => { if (!finished) setRunning(r => !r); };
  const reset  = () => { setRunning(false); setFinished(false); setSecondsLeft(plannedMin * 60); };

  const mm = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
  const ss = String(secondsLeft % 60).padStart(2, '0');
  const pct = 1 - secondsLeft / (plannedMin * 60);

  return { mm, ss, pct, running, finished, toggle, reset };
}

        <button onClick={handleOpen} style={{ width: 28, height: 28, borderRadius: 8, border: '2px solid ' + (done ? '#5cba7d' : cat.color), background: done ? '#5cba7d' : 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          {done && <span style={{ color: '#1a1a18', fontSize: 14, fontWeight: 800 }}>✓</span>}
        </button>
        <span style={{ fontSize: 22 }}>{cat.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11, color: done ? '#5cba7d' : cat.color, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 1 }}>
            {cat.label}{block.familyName ? <span style={{ color: '#555', fontWeight: 400, marginLeft: 6, textTransform: 'none', letterSpacing: 0 }}>· {block.familyName}</span> : ''}
            {block.isCatchup && <span style={{ color: '#7b9cdf', fontWeight: 600, fontSize: 10, marginLeft: 8, letterSpacing: 0.5, textTransform: 'none' }}>🔄 rattrapage</span>}
          </div>
          <div style={{ fontSize: 14, color: done ? '#7abf96' : '#f0e6d0' }}>{block.title}</div>
          {done && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 2 }}>
              {block.validatedMastery && <span style={{ fontSize: 11, color: (MASTERY[block.validatedMastery]||MASTERY.fragile).color }}>{(MASTERY[block.validatedMastery]||MASTERY.fragile).label} · {block.actualMin} min</span>}
              <span style={{ fontSize: 10, color: '#555', cursor: 'pointer' }} onClick={handleOpen}>✎ modifier</span>
            </div>
          )}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
          <div style={{ background: done ? 'rgba(92,186,125,0.15)' : 'rgba(201,168,76,0.12)', border: '1px solid ' + (done ? 'rgba(92,186,125,0.3)' : 'rgba(201,168,76,0.25)'), borderRadius: 8, padding: '4px 10px', color: done ? '#5cba7d' : '#c9a84c', fontWeight: 700, fontSize: 14, fontFamily: 'monospace' }}>{block.plannedMin}'</div>
          {hasNotes && (
            <button onClick={e => { e.stopPropagation(); setShowNotes(s => !s); }} style={{ padding: '3px 8px', background: showNotes ? 'rgba(201,168,76,0.15)' : 'rgba(255,255,255,0.05)', border: '1px solid', borderColor: showNotes ? 'rgba(201,168,76,0.3)' : 'rgba(255,255,255,0.1)', borderRadius: 6, color: showNotes ? '#c9a84c' : '#555', cursor: 'pointer', fontSize: 11 }}>
              {item.images && item.images.length > 0 ? '📷' : '📝'}
            </button>
          )}
        </div>
      </div>

      {/* Timer */}
      {!done && (
        <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', padding: '10px 16px', background: 'rgba(0,0,0,0.1)', display: 'flex', alignItems: 'center', gap: 12 }}>
          {/* Circular progress */}
          <div style={{ position: 'relative', width: 48, height: 48, flexShrink: 0 }}>
            <svg width="48" height="48" viewBox="0 0 48 48">
              <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="3"/>
              <circle cx="24" cy="24" r="20" fill="none"
                stroke={timer.finished ? '#5cba7d' : timer.running ? cat.color : 'rgba(255,255,255,0.2)'}
                strokeWidth="3" strokeLinecap="round"
                strokeDasharray={`${2 * Math.PI * 20}`}
                strokeDashoffset={`${2 * Math.PI * 20 * (1 - timer.pct)}`}
                transform="rotate(-90 24 24)"
                style={{ transition: 'stroke-dashoffset 1s linear' }}
              />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontFamily: 'monospace', color: timer.finished ? '#5cba7d' : '#888', fontWeight: 700 }}>
              {timer.finished ? '✓' : `${timer.mm}:${timer.ss}`}
            </div>
          </div>

          {/* Display */}
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 22, fontFamily: 'monospace', fontWeight: 700, color: timer.finished ? '#5cba7d' : timer.running ? '#f0e6d0' : '#888', letterSpacing: 1 }}>
              {timer.mm}<span style={{ opacity: timer.running ? 1 : 0.4 }}>:</span>{timer.ss}
            </div>
            <div style={{ fontSize: 10, color: '#555', marginTop: 1 }}>
              {timer.finished ? 'Temps écoulé !' : timer.running ? 'En cours…' : 'Prêt'}
            </div>
          </div>

          {/* Controls */}
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={timer.toggle} disabled={timer.finished}
              style={{ width: 44, height: 44, borderRadius: 12, border: 'none', background: timer.finished ? 'rgba(92,186,125,0.15)' : timer.running ? 'rgba(224,92,92,0.15)' : cat.color + '25', color: timer.finished ? '#5cba7d' : timer.running ? '#e05c5c' : cat.color, cursor: timer.finished ? 'default' : 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {timer.running ? '⏸' : '▶'}
            </button>
            <button onClick={timer.reset}
              style={{ width: 44, height: 44, borderRadius: 12, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#555', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              ↺
            </button>
          </div>
        </div>
      )}

      {showNotes && item && (
        <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', padding: '12px 16px', background: 'rgba(0,0,0,0.1)' }}>
          {item.notes && <div style={{ fontSize: 13, color: '#c8bfa8', lineHeight: 1.7, whiteSpace: 'pre-wrap', marginBottom: item.images && item.images.length ? 12 : 0 }}>{item.notes}</div>}
          {item.images && item.images.length > 0 && <ImageGallery images={item.images} />}
        </div>
      )}

      {open && (
        <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', padding: '14px 16px', background: 'rgba(0,0,0,0.15)' }}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 11, color: '#888', letterSpacing: 1, textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>Temps réel (min)</label>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {quickTimes.map(v => (
                <button key={v} onClick={() => setActualMin(String(v))} style={{ padding: '8px 16px', borderRadius: 10, border: '1px solid', fontSize: 14, fontFamily: 'monospace', fontWeight: 700, cursor: 'pointer', background: actualMin===String(v)?'rgba(201,168,76,0.2)':'rgba(255,255,255,0.04)', borderColor: actualMin===String(v)?'#c9a84c':'rgba(255,255,255,0.1)', color: actualMin===String(v)?'#c9a84c':'#888' }}>{v}'</button>
              ))}
              <input type="number" min="1" max="60" value={actualMin} onChange={e => setActualMin(e.target.value)}
                style={{ width: 64, background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 10, padding: '8px', color: '#f0e6d0', fontSize: 14, fontFamily: 'monospace', outline: 'none', textAlign: 'center' }} />
            </div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 11, color: '#888', letterSpacing: 1, textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>Maîtrise</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {Object.entries(MASTERY).map(([k,m]) => (
                <button key={k} onClick={() => setMastery(k)} style={{ flex: 1, padding: '10px 4px', borderRadius: 12, border: '1px solid', fontSize: 11, fontWeight: 700, cursor: 'pointer', textAlign: 'center', background: mastery===k?m.color+'25':'rgba(255,255,255,0.03)', borderColor: mastery===k?m.color:'rgba(255,255,255,0.08)', color: mastery===k?m.color:'#555' }}>
                  <div style={{ fontSize: 18, marginBottom: 3 }}>{k==='non_maitrise'?'🔴':k==='fragile'?'🟡':'🟢'}</div>
                  {m.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => { onValidate(block.itemId, parseInt(actualMin)||block.plannedMin, mastery, false); setOpen(false); }} style={{ flex: 1, padding: '12px', background: '#c9a84c', border: 'none', borderRadius: 12, color: '#1a1a18', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>
              {done ? '✓ Mettre à jour' : '✓ Marquer comme fait'}
            </button>
            {done && <button onClick={() => { onValidate(block.itemId, null, null, true); setOpen(false); }} style={{ padding: '12px 16px', background: 'rgba(224,92,92,0.15)', border: '1px solid rgba(224,92,92,0.3)', borderRadius: 12, color: '#e05c5c', fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>Annuler</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── OFF / ALTERNATIF VIEWS ──────────────────────────────────────────────────
function OffTotalView() {
  return (
    <div style={{ textAlign: 'center', padding: '40px 20px' }}>
      <div style={{ fontSize: 64, marginBottom: 16 }}>🚫</div>
      <div style={{ fontSize: 20, color: '#f0e6d0', fontFamily: "'Playfair Display', serif", marginBottom: 8 }}>Journée off total</div>
      <div style={{ fontSize: 14, color: '#555', lineHeight: 1.7 }}>Pas de musique aujourd'hui.<br/>L'app reprend normalement demain.</div>
    </div>
  );
}

function AlternatifView({ sessions, setSessions }) {
  const todaySession = sessions.find(s => s.date === TODAY);
  const periodId = todaySession?.periodId;
  const periodSessions = periodId ? sessions.filter(s => s.periodId === periodId && s.type === 'alternatif') : [todaySession].filter(Boolean);
  const periodDays = todaySession?.periodDays || 1;
  const budget = periodDays * 10;
  const totalSpent = periodSessions.reduce((a, s) => a + (s.timeSpent || 0), 0);
  const remaining = Math.max(0, budget - totalSpent);
  const done = totalSpent >= budget;

  const [manualMin, setManualMin] = useState('');
  const [note, setNote] = useState(todaySession?.note || '');
  const [timerSec, setTimerSec] = useState(remaining * 60);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimerSec(s => { if (s <= 0) { clearInterval(intervalRef.current); setRunning(false); return 0; } return s - 1; });
      }, 1000);
    } else clearInterval(intervalRef.current);
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const mm = String(Math.floor(timerSec / 60)).padStart(2, '0');
  const ss = String(timerSec % 60).padStart(2, '0');
  const pct = Math.min(1, totalSpent / budget);

  const [timeAdded, setTimeAdded] = useState(null);
  const addTime = (min) => {
    const added = parseInt(min) || 0;
    if (!added) return;
    setSessions(prev => prev.map(s =>
      s.date === TODAY ? { ...s, timeSpent: (s.timeSpent || 0) + added, note } : s
    ));
    setManualMin('');
    setTimerSec(Math.max(0, (remaining - added) * 60));
    setTimeAdded(added);
    setTimeout(() => setTimeAdded(null), 2000);
  };

  const [noteSaved, setNoteSaved] = useState(false);
  const saveNote = () => {
    setSessions(prev => prev.map(s => s.date === TODAY ? { ...s, note } : s));
    setNoteSaved(true);
    setTimeout(() => setNoteSaved(false), 2000);
  };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24 }}>
        <span style={{ fontSize: 36 }}>🎒</span>
        <div>
          <div style={{ fontSize: 12, color: '#888', letterSpacing: 2, textTransform: 'uppercase' }}>Travail alternatif</div>
          <div style={{ fontSize: 18, color: '#f0e6d0', fontFamily: "'Playfair Display', serif" }}>
            {new Date(TODAY + 'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}
          </div>
        </div>
      </div>

      {/* Budget progress */}
      <div style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 14, padding: 18, marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
          <span style={{ fontSize: 13, color: '#888' }}>Budget période ({periodDays} jour{periodDays > 1 ? 's' : ''})</span>
          <span style={{ fontSize: 13, fontFamily: 'monospace', fontWeight: 700, color: done ? '#5cba7d' : '#c9a84c' }}>{totalSpent}/{budget} min</span>
        </div>
        <div style={{ height: 6, background: 'rgba(255,255,255,0.07)', borderRadius: 3, overflow: 'hidden', marginBottom: 8 }}>
          <div style={{ height: '100%', width: (pct * 100) + '%', background: done ? '#5cba7d' : '#c9a84c', borderRadius: 3, transition: 'width 0.4s ease' }} />
        </div>
        {done
          ? <div style={{ fontSize: 12, color: '#5cba7d' }}>🎉 Budget atteint — beau travail !</div>
          : <div style={{ fontSize: 12, color: '#555' }}>Encore {remaining} min pour valider la période</div>
        }
        {timeAdded && (
          <div style={{ marginTop: 8, fontSize: 12, color: '#5cba7d', fontWeight: 600, transition: 'all 0.3s' }}>✓ +{timeAdded} min ajoutées !</div>
        )}
      </div>

      {/* Timer */}
      <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 14, padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: '#888', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 14 }}>Minuteur</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ fontSize: 42, fontFamily: 'monospace', fontWeight: 700, color: running ? '#f0e6d0' : '#555', letterSpacing: 2 }}>{mm}:{ss}</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button onClick={() => setRunning(r => !r)} style={{ width: 52, height: 52, borderRadius: 14, border: 'none', background: running ? 'rgba(224,92,92,0.15)' : 'rgba(201,168,76,0.15)', color: running ? '#e05c5c' : '#c9a84c', cursor: 'pointer', fontSize: 22, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {running ? '⏸' : '▶'}
            </button>
            <button onClick={() => { setRunning(false); setTimerSec(remaining * 60); }} style={{ width: 52, height: 52, borderRadius: 14, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.04)', color: '#555', cursor: 'pointer', fontSize: 20 }}>↺</button>
          </div>
        </div>
        <button onClick={() => { const elapsed = Math.round((remaining * 60 - timerSec) / 60); if (elapsed > 0) { addTime(elapsed); setRunning(false); } }}
          disabled={Math.round((remaining * 60 - timerSec) / 60) <= 0}
          style={{ marginTop: 14, width: '100%', padding: '10px', background: Math.round((remaining * 60 - timerSec) / 60) > 0 ? 'rgba(201,168,76,0.1)' : 'rgba(255,255,255,0.03)', border: '1px solid', borderColor: Math.round((remaining * 60 - timerSec) / 60) > 0 ? 'rgba(201,168,76,0.25)' : 'rgba(255,255,255,0.08)', borderRadius: 10, color: Math.round((remaining * 60 - timerSec) / 60) > 0 ? '#c9a84c' : '#444', fontWeight: 600, fontSize: 13, cursor: Math.round((remaining * 60 - timerSec) / 60) > 0 ? 'pointer' : 'default' }}>
          ✓ Valider le temps du minuteur ({Math.max(0, Math.round((remaining * 60 - timerSec) / 60))} min)
        </button>
      </div>

      {/* Manual entry */}
      <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 14, padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: '#888', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 14 }}>Ajouter un temps manuellement</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[10, 15, 20, 30].map(v => (
            <button key={v} onClick={() => setManualMin(String(v))} style={{ flex: 1, padding: '10px 4px', borderRadius: 10, border: '1px solid', fontSize: 13, fontFamily: 'monospace', fontWeight: 700, cursor: 'pointer', background: manualMin === String(v) ? 'rgba(201,168,76,0.2)' : 'rgba(255,255,255,0.04)', borderColor: manualMin === String(v) ? '#c9a84c' : 'rgba(255,255,255,0.1)', color: manualMin === String(v) ? '#c9a84c' : '#888' }}>{v}'</button>
          ))}
          <input type="number" min="1" max="120" value={manualMin} onChange={e => setManualMin(e.target.value)}
            style={{ width: 56, background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)', borderRadius: 10, padding: '8px', color: '#f0e6d0', fontSize: 14, fontFamily: 'monospace', outline: 'none', textAlign: 'center' }} />
        </div>
        <button onClick={() => addTime(manualMin)} disabled={!manualMin}
          style={{ marginTop: 12, width: '100%', padding: '11px', background: manualMin ? '#c9a84c' : 'rgba(255,255,255,0.05)', border: 'none', borderRadius: 10, color: manualMin ? '#1a1a18' : '#555', fontWeight: 700, fontSize: 14, cursor: manualMin ? 'pointer' : 'default' }}>
          + Ajouter {manualMin ? manualMin + ' min' : ''}
        </button>
      </div>

      {/* Note */}
      <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 14, padding: 20 }}>
        <div style={{ fontSize: 11, color: '#888', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 10 }}>Ce que tu as fait</div>
        <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Synthé, lecture, théorie, écoute active..." rows={3}
          style={{ width: '100%', background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10, padding: '10px 12px', color: '#c8bfa8', fontSize: 13, outline: 'none', resize: 'vertical', fontFamily: 'inherit', lineHeight: 1.6 }} />
        <button onClick={saveNote} style={{ marginTop: 10, padding: '8px 16px', background: noteSaved ? 'rgba(92,186,125,0.15)' : 'rgba(255,255,255,0.06)', border: '1px solid', borderColor: noteSaved ? 'rgba(92,186,125,0.4)' : 'rgba(255,255,255,0.12)', borderRadius: 8, color: noteSaved ? '#5cba7d' : '#888', cursor: 'pointer', fontSize: 12, transition: 'all 0.3s' }}>
          {noteSaved ? '✓ Note enregistrée !' : 'Enregistrer la note'}
        </button>
      </div>
    </div>
  );
}

// ─── TODAY VIEW ───────────────────────────────────────────────────────────────
function TodayView({ items, settings, sessions, setSessions, setItems }) {
  const existing = sessions.find(s => s.date === TODAY);
  const [session, setSession] = useState(existing || null);
  const [generated, setGenerated] = useState(!!existing);
  const thisWeek = getWeekKey(new Date(), settings?.weekStartDay ?? 4);
  const jokerUsed = sessions.some(s => s.weekKey === thisWeek && s.joker && s.date !== TODAY);
  const isJoker = !!existing?.joker;
  const isOff = existing?.type === 'off';
  const isAlternatif = existing?.type === 'alternatif';

  if (isOff) return <OffTotalView />;
  if (isAlternatif) return <AlternatifView sessions={sessions} setSessions={setSessions} />;

  useEffect(() => {
    if (!generated && items.length > 0) {
      const s = generateSession(items, settings, sessions, TODAY);
      setSession({ ...s, date: TODAY, validated: false });
      setGenerated(true);
    }
  }, [items, settings, sessions, generated]);

  const handleJoker = () => {
    const j = { date: TODAY, weekKey: thisWeek, joker: true, validated: false };
    setSession(j);
    setSessions(p => [...p.filter(s => s.date !== TODAY), j]);
  };

  const handleBlockValidate = (itemId, actualMin, newMastery, cancel) => {
    setSession(prev => {
      if (!prev) return prev;
      const blocks = prev.blocks.map(b => {
        if (b.itemId !== itemId) return b;
        if (cancel) return { ...b, validated: false, actualMin: null, validatedMastery: null };
        return { ...b, validated: true, actualMin, validatedMastery: newMastery };
      });
      const allDone = blocks.every(b => b.validated);
      const totalActual = blocks.reduce((a,b) => a+(b.actualMin||0), 0);
      const updated = { ...prev, blocks, validated: allDone, actualMin: totalActual };
      setSessions(p => [...p.filter(s => s.date !== TODAY), updated]);
      if (!cancel) {
        setItems(p => p.map(item => {
          if (item.id !== itemId) return item;
          const block = blocks.find(b => b.itemId === itemId);
          return { ...item, mastery: newMastery||item.mastery, lastWorked: TODAY, lastRevised: block?.category==='revision'?TODAY:item.lastRevised };
        }));
      }
      return updated;
    });
  };

  const totalPlanned = session?.blocks?.reduce((a,b) => a+b.plannedMin, 0) ?? 0;
  const doneCount = session?.blocks?.filter(b => b.validated).length ?? 0;
  const totalCount = session?.blocks?.length ?? 0;
  const allDone = doneCount > 0 && doneCount === totalCount;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: '#888', letterSpacing: 2, textTransform: 'uppercase' }}>Aujourd'hui</div>
          <div style={{ fontSize: 20, color: '#f0e6d0', fontFamily: "'Playfair Display', serif" }}>
            {new Date(TODAY+'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}
          </div>
        </div>
        {!isJoker && (
          <div style={{ textAlign: 'center', background: 'rgba(201,168,76,0.1)', border: '1px solid rgba(201,168,76,0.3)', borderRadius: 12, padding: '8px 16px' }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: '#c9a84c', fontFamily: 'monospace' }}>{totalPlanned}'</div>
            <div style={{ fontSize: 10, color: '#888', letterSpacing: 1 }}>PLANIFIÉ</div>
          </div>
        )}
      </div>

      {/* Catchup banner */}
      {!isJoker && session?.catchupMin > 0 && (
        <div style={{ background: 'rgba(123,156,223,0.08)', border: '1px solid rgba(123,156,223,0.2)', borderRadius: 12, padding: '12px 16px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 22 }}>🔄</span>
          <div>
            <div style={{ color: '#7b9cdf', fontWeight: 700, fontSize: 14 }}>Session de rattrapage</div>
            <div style={{ color: '#888', fontSize: 12, marginTop: 2 }}>+{session.catchupMin} min · un exercice supplémentaire a été ajouté</div>
          </div>
        </div>
      )}

      {!isJoker && totalCount > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 12, color: '#888' }}>Progression</span>
            <span style={{ fontSize: 12, color: allDone?'#5cba7d':'#c9a84c', fontFamily: 'monospace', fontWeight: 700 }}>{doneCount}/{totalCount}</span>
          </div>
          <div style={{ height: 4, background: 'rgba(255,255,255,0.07)', borderRadius: 4, overflow: 'hidden' }}>
            <div style={{ height: '100%', borderRadius: 4, width: (doneCount/totalCount*100)+'%', background: allDone?'#5cba7d':'#c9a84c', transition: 'width 0.4s ease' }} />
          </div>
        </div>
      )}

      {isJoker && (
        <div style={{ background: 'rgba(201,168,76,0.08)', border: '1px solid rgba(201,168,76,0.25)', borderRadius: 14, padding: '18px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 14 }}>
          <span style={{ fontSize: 32 }}>🃏</span>
          <div>
            <div style={{ color: '#c9a84c', fontWeight: 700, fontSize: 16 }}>Jour joker — repos mérité</div>
            <div style={{ color: '#888', fontSize: 13, marginTop: 3 }}>Pas de session aujourd'hui. À demain !</div>
          </div>
        </div>
      )}

      {allDone && (
        <div style={{ background: 'rgba(92,186,125,0.1)', border: '1px solid rgba(92,186,125,0.3)', borderRadius: 14, padding: '16px 18px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 28 }}>🎉</span>
          <div>
            <div style={{ color: '#5cba7d', fontWeight: 700, fontSize: 15 }}>Session complète !</div>
            <div style={{ color: '#888', fontSize: 13, marginTop: 2 }}>{session.blocks.reduce((a,b)=>a+(b.actualMin||0),0)} min · {doneCount} blocs</div>
          </div>
        </div>
      )}

      {!isJoker && session?.blocks?.map((block, i) => (
        <BlockCard key={i} block={block} items={items} onValidate={handleBlockValidate} />
      ))}

      {!isJoker && session && !allDone && (
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
          {jokerUsed
            ? <div style={{ textAlign: 'center', fontSize: 12, color: '#555' }}>🃏 Joker déjà utilisé cette semaine</div>
            : <button onClick={handleJoker} style={{ width: '100%', padding: '12px', background: 'transparent', border: '1px solid rgba(201,168,76,0.2)', borderRadius: 12, color: '#888', fontWeight: 600, fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <span>🃏</span> Joker
              </button>
          }
        </div>
      )}

      {!session && (
        <div style={{ textAlign: 'center', padding: 40, color: '#555' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🎵</div>
          <div>Ajoute des exercices dans la Bibliothèque.</div>
        </div>
      )}
    </div>
  );
}
