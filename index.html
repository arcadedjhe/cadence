// ─── LIBRARY VIEW ─────────────────────────────────────────────────────────────
function LibraryView({ items, setItems }) {
  const [adding, setAdding] = useState(false);
  const [addingType, setAddingType] = useState(null); // 'item' | 'group'
  const [addingVariantTo, setAddingVariantTo] = useState(null); // parentId
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState('all');
  const [expandedNotes, setExpandedNotes] = useState({});
  const [expandedFamilies, setExpandedFamilies] = useState({});
  const toggleFamily = id => setExpandedFamilies(p => ({ ...p, [id]: !p[id] }));

  const match = i => filter==='all'||( filter==='active'&&i.isActive)||(filter==='priority'&&i.frequency==='priority')||(filter==='occasional'&&i.frequency==='occasional')||(filter==='paused'&&i.paused);

  const addItem = (form, parentId = null) => {
    const n = { ...form, id: Date.now().toString(), lastWorked: null, lastRevised: null };
    if (parentId) { n.parentId = parentId; n.isGroup = false; }
    if (form.category !== 'morceau' && !parentId) n.isActive = true;
    if (parentId) { const parent = items.find(i => i.id === parentId); if (parent) n.isActive = parent.isActive; }
    setItems(p => [...p, n]);
    setAdding(false);
    setAddingVariantTo(null);
  };
  const updateItem = form => { setItems(p=>p.map(i=>i.id===editing.id?{...i,...form}:i)); setEditing(null); };
  const deleteItem = id => setItems(p=>p.filter(i=>i.id!==id));
  const cycleFreq = id => { const c={normal:'priority',priority:'occasional',occasional:'normal'}; setItems(p=>p.map(i=>i.id===id?{...i,frequency:c[i.frequency||'normal']}:i)); };
  const toggleActive = id => setItems(p=>p.map(i=>i.id===id?{...i,isActive:!i.isActive}:i));
  const togglePause = (id) => setItems(p => p.map(i => i.id === id ? { ...i, paused: !i.paused } : i));

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
        {[{key:'all',label:'Tout'},{key:'active',label:'En cours'},{key:'priority',label:'⭐ Prioritaires'},{key:'occasional',label:'🌙 Occasionnels'},{key:'paused',label:'⏸ En pause'}].map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)} style={{ padding: '6px 14px', borderRadius: 20, border: '1px solid', fontSize: 12, fontWeight: 600, cursor: 'pointer', background: filter===f.key?'#c9a84c':'transparent', color: filter===f.key?'#1a1a18':'#888', borderColor: filter===f.key?'#c9a84c':'rgba(255,255,255,0.12)' }}>{f.label}</button>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          <button onClick={() => { setAddingType('group'); setAdding(false); }} style={{ padding: '6px 12px', borderRadius: 20, background: 'transparent', border: '1px solid rgba(201,168,76,0.3)', color: '#c9a84c', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>📁 Groupe</button>
          <button onClick={() => { setAdding(true); setAddingType(null); }} style={{ padding: '6px 16px', borderRadius: 20, background: '#c9a84c', border: 'none', color: '#1a1a18', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>+ Ajouter</button>
        </div>
      </div>

      {/* Add item form */}
      {adding && (
        <ItemForm
          onSave={f => { const n = {...f, id: Date.now().toString(), lastWorked: null, lastRevised: null}; if(f.category!=='morceau') n.isActive=true; setItems(p=>[...p,n]); setAdding(false); }}
          onCancel={() => setAdding(false)}
        />
      )}

      {/* Add group form - just a name + category */}
      {addingType === 'group' && (
        <GroupForm
          onSave={(title, category) => {
            const n = { id: Date.now().toString(), title, category, isGroup: true };
            setItems(p => [...p, n]);
            setAddingType(null);
          }}
          onCancel={() => setAddingType(null)}
        />
      )}

      {Object.entries(CATEGORIES).map(([cat, catInfo]) => {
        const catItems = items.filter(i => i.category===cat && match(i));
        if (!catItems.length) return null;
        return (
          <div key={cat} style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 18 }}>{catInfo.icon}</span>
              <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: catInfo.color, textTransform: 'uppercase' }}>{catInfo.label}</span>
              <span style={{ fontSize: 12, color: '#555' }}>({catItems.length})</span>
            </div>
            {/* Separate families and standalone items */}
            {(() => {
              const families = catItems.filter(i => i.isGroup);
              const standalone = catItems.filter(i => !i.isGroup && !i.parentId);
              const renderItem = (item, isVariant = false) => (
                <div key={item.id}>
                  {editing?.id===item.id
                    ? <ItemForm initial={item} onSave={updateItem} onCancel={() => setEditing(null)} />
                    : (
                    <div style={{ background: item.paused ? 'rgba(255,255,255,0.01)' : 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 12, padding: '12px 14px', marginBottom: 8, opacity: item.paused ? 0.55 : 1 }}>

                      {/* ── Ligne 1 : Titre + badges ── */}
                      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8, marginBottom: 6 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <span style={{ color: item.paused ? '#888' : '#f0e6d0', fontSize: 14 }}>{item.title}</span>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginTop: 4 }}>
                            {item.paused && <span style={{ fontSize: 10, background: 'rgba(255,255,255,0.07)', color: '#666', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>EN PAUSE</span>}
                            {!item.paused && item.frequency==='priority' && <span style={{ fontSize: 10, background: 'rgba(201,168,76,0.15)', color: '#c9a84c', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>⭐ Prioritaire</span>}
                            {!item.paused && item.frequency==='occasional' && <span style={{ fontSize: 10, background: 'rgba(123,156,223,0.15)', color: '#7b9cdf', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>🌙 Occasionnel</span>}
                            {!item.paused && item.category==='morceau' && item.isActive && <span style={{ fontSize: 10, background: 'rgba(92,186,125,0.15)', color: '#5cba7d', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>En cours</span>}
                            {item.parentId && (() => { const g = items.find(i => i.id === item.parentId); return g ? <span style={{ fontSize: 10, background: 'rgba(255,255,255,0.06)', color: '#666', padding: '2px 7px', borderRadius: 10 }}>📁 {g.title}</span> : null; })()}
                          </div>
                          {/* Vu depuis */}
                          {!item.paused && (() => {
                            const freq = item.frequency||'normal'; const maxDays = MAX_DAYS_UNSEEN[freq];
                            const daysSince = item.lastWorked ? Math.floor((new Date(TODAY)-new Date(item.lastWorked))/86400000) : null;
                            const overdue = daysSince!==null && daysSince>=maxDays;
                            const color = overdue?'#e05c5c':daysSince===null?'#555':daysSince>maxDays*0.7?'#e0a83a':'#555';
                            const label = daysSince===null?'jamais travaillé':daysSince===0?"aujourd'hui":`il y a ${daysSince}j`;
                            return <div style={{ fontSize: 11, color, marginTop: 5 }}>{overdue?'⚠️ ':''}Vu : {label}{overdue?' — relance auto':''}</div>;
                          })()}
                        </div>

                        {/* ── Boutons d'action (icônes uniquement) ── */}
                        <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
                          {(item.notes||(item.images&&item.images.length>0)) && (
                            <button onClick={() => setExpandedNotes(p=>({...p,[item.id]:!p[item.id]}))}
                              style={{ width: 30, height: 30, borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: expandedNotes[item.id]?'rgba(201,168,76,0.15)':'rgba(255,255,255,0.05)', color: expandedNotes[item.id]?'#c9a84c':'#666', cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                              {item.images&&item.images.length>0?'📷':'📝'}
                            </button>
                          )}
                          <button onClick={() => setEditing(item)}
                            style={{ width: 30, height: 30, borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#888', cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>✎</button>
                          <button onClick={() => togglePause(item.id)}
                            title={item.paused?'Reprendre':'Mettre en pause'}
                            style={{ width: 30, height: 30, borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#888', cursor: 'pointer', fontSize: 12, fontFamily: 'monospace', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            {item.paused?'▷':'❙ ❙'}
                          </button>
                          <button onClick={() => deleteItem(item.id)}
                            style={{ width: 30, height: 30, borderRadius: 8, border: '1px solid rgba(255,255,255,0.1)', background: 'rgba(255,255,255,0.05)', color: '#e05c5c', cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                        </div>
                      </div>

                      {/* ── Ligne 2 : Fréquence + Morceau en cours + Groupe ── */}
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', paddingTop: 8, borderTop: '1px solid rgba(255,255,255,0.05)' }}>
                        {/* Fréquence */}
                        <button onClick={() => cycleFreq(item.id)}
                          style={{ padding: '4px 10px', borderRadius: 20, border: '1px solid', fontSize: 11, fontWeight: 600, cursor: 'pointer',
                            background: item.frequency==='priority'?'rgba(201,168,76,0.12)':item.frequency==='occasional'?'rgba(123,156,223,0.12)':'rgba(255,255,255,0.04)',
                            borderColor: item.frequency==='priority'?'rgba(201,168,76,0.3)':item.frequency==='occasional'?'rgba(123,156,223,0.3)':'rgba(255,255,255,0.08)',
                            color: item.frequency==='priority'?'#c9a84c':item.frequency==='occasional'?'#7b9cdf':'#555' }}>
                          {item.frequency==='priority'?'⭐ Prioritaire':item.frequency==='occasional'?'🌙 Occasionnel':'— Normal'}
                        </button>

                        {/* En cours (morceaux) */}
                        {item.category==='morceau' && (
                          <button onClick={() => toggleActive(item.id)}
                            style={{ padding: '4px 10px', borderRadius: 20, border: '1px solid', fontSize: 11, fontWeight: 600, cursor: 'pointer',
                              background: item.isActive?'rgba(92,186,125,0.12)':'rgba(255,255,255,0.04)',
                              borderColor: item.isActive?'rgba(92,186,125,0.3)':'rgba(255,255,255,0.08)',
                              color: item.isActive?'#5cba7d':'#555' }}>
                            {item.isActive?'✓ En cours':'En cours ?'}
                          </button>
                        )}

                        {/* Groupe */}
                        {items.filter(i => i.isGroup && i.category === item.category).length > 0 && (
                          <select value={item.parentId||''} onChange={e => { const v = e.target.value||null; setItems(p=>p.map(i=>i.id===item.id?{...i,parentId:v}:i)); }}
                            style={{ padding: '4px 8px', background: '#2a2a28', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 20, color: item.parentId?'#c9a84c':'#555', fontSize: 11, cursor: 'pointer', outline: 'none' }}>
                            <option value=''>📁 Sans groupe</option>
                            {items.filter(i => i.isGroup && i.category===item.category).map(g=>(
                              <option key={g.id} value={g.id}>📁 {g.title}</option>
                            ))}
                          </select>
                        )}
                      </div>

                      {/* ── Ligne 3 : Maîtrise ── */}
                      {item.mastery && (
                        <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap', alignItems: 'center' }}>

                          {Object.entries(MASTERY).map(([k,m]) => (
                            <button key={k} onClick={() => setItems(p=>p.map(i=>i.id===item.id?{...i,mastery:k}:i))}
                              style={{ padding: '3px 10px', borderRadius: 20, border: '1px solid', fontSize: 11, fontWeight: 600, cursor: 'pointer',
                                background: item.mastery===k?m.color+'25':'transparent',
                                borderColor: item.mastery===k?m.color:'rgba(255,255,255,0.08)',
                                color: item.mastery===k?m.color:'#555' }}>{m.label}</button>
                          ))}
                        </div>
                      )}

                      {/* ── Notes / Photos ── */}
                      {expandedNotes[item.id] && (item.notes||(item.images&&item.images.length>0)) && (
                        <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                          {item.notes && <div style={{ fontSize: 13, color: '#c8bfa8', lineHeight: 1.7, whiteSpace: 'pre-wrap', marginBottom: item.images&&item.images.length?12:0 }}>{item.notes}</div>}
                          {item.images&&item.images.length>0 && <ImageGallery images={item.images} />}
                        </div>
                      )}
                      {!item.notes&&!(item.images&&item.images.length>0) && (
                        <button onClick={() => setEditing(item)} style={{ marginTop: 6, fontSize: 11, color: '#555', background: 'transparent', border: 'none', cursor: 'pointer', padding: 0 }}>+ Notes ou photos</button>
                      )}
                    </div>
                  )}
              </div>
            );
              return (
                <div key={cat}>
                  {/* Families */}
                  {families.map(family => (
                    <div key={family.id} style={{ marginBottom: 8 }}>
                      {/* Family header */}
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 12, padding: '10px 14px', marginBottom: expandedFamilies[family.id] ? 4 : 0 }}>
                        <button onClick={() => toggleFamily(family.id)} style={{ background: 'transparent', border: 'none', color: '#c9a84c', cursor: 'pointer', fontSize: 16, padding: 0, width: 20 }}>
                          {expandedFamilies[family.id] ? '▼' : '▶'}
                        </button>
                        <span style={{ color: '#f0e6d0', fontSize: 14, fontWeight: 600, flex: 1 }}>{family.title}</span>
                        <span style={{ fontSize: 11, color: '#555' }}>
                          {catItems.filter(i => i.parentId === family.id).length} variante{catItems.filter(i => i.parentId === family.id).length > 1 ? 's' : ''}
                        </span>
                        <button onClick={() => { setAddingVariantTo(family.id); setAdding(false); }} style={{ padding: '3px 8px', background: 'rgba(201,168,76,0.1)', border: '1px solid rgba(201,168,76,0.25)', borderRadius: 6, color: '#c9a84c', cursor: 'pointer', fontSize: 11 }}>+ variante</button>
                        <button onClick={() => setEditing(family)} style={{ padding: '5px 8px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, color: '#888', cursor: 'pointer', fontSize: 13 }}>✎</button>
                        <button onClick={() => deleteItem(family.id)} style={{ padding: '5px 8px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, color: '#e05c5c', cursor: 'pointer', fontSize: 13 }}>×</button>
                      </div>
                      {/* Variant form */}
                      {addingVariantTo === family.id && (
                        <div style={{ marginLeft: 20, marginBottom: 8 }}>
                          <ItemForm
                            initial={{ title: '', category: cat, isActive: true, frequency: 'normal', mastery: 'non_maitrise', notes: '', images: [] }}
                            onSave={form => addItem(form, family.id)}
                            onCancel={() => setAddingVariantTo(null)}
                          />
                        </div>
                      )}
                      {/* Variants */}
                      {expandedFamilies[family.id] && (
                        <div style={{ marginLeft: 20 }}>
                          {catItems.filter(i => i.parentId === family.id).map(variant => renderItem(variant, true))}
                        </div>
                      )}
                    </div>
                  ))}
                  {/* Standalone items */}
                  {standalone.map(item => renderItem(item, false))}
                </div>
              );
            })()}
          </div>
        );
      })}
      {/* Add family button */}

    </div>
  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({ sessions, setSessions, settings }) {
  const now = new Date();
  const [vm, setVm] = useState(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  const [absent, setAbsent] = useState(null);
  const [selected, setSelected] = useState(null);
  const [year, month] = vm.split('-').map(Number);
  const firstDay = new Date(year,month-1,1).getDay();
  const daysInMonth = new Date(year,month,0).getDate();
  const offset = (firstDay+6)%7;
  const days = [...Array(offset).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];

  const getS = d => d ? sessions.find(s=>s.date===`${vm}-${String(d).padStart(2,'0')}`) : null;
  const prev = () => { const d=new Date(year,month-2,1); setVm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); };
  const next = () => { const d=new Date(year,month,1); setVm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); };

  const [dayModal, setDayModal] = useState(null); // {d, dateStr, existing}
  const [altDays, setAltDays] = useState(1); // number of days for alternatif period

  const openModal = (d) => {
    const dateStr = `${vm}-${String(d).padStart(2,'0')}`;
    const existing = sessions.find(s => s.date === dateStr);
    setDayModal({ d, dateStr, existing });
    setAltDays(1);
  };

  const clearDay = (dateStr) => {
    setSessions(p => p.filter(s => s.date !== dateStr));
    setDayModal(null);
  };

  const markOff = (dateStr) => {
    setSessions(p => [...p.filter(s => s.date !== dateStr), { date: dateStr, type: 'off', weekKey: getWeekKey(new Date(dateStr)) }]);
    setDayModal(null);
  };

  const markAlternatif = (dateStr, nDays) => {
    const periodId = 'alt_' + dateStr;
    const dailyMin = settings ? (settings.alternatifDailyMin || 10) : 10;
    const budget = nDays * dailyMin;
    const startDate = new Date(dateStr + 'T12:00:00');
    const newSessions = Array.from({ length: nDays }, (_, i) => {
      const d = new Date(startDate); d.setDate(d.getDate() + i);
      const ds = d.toISOString().slice(0, 10);
      return { date: ds, type: 'alternatif', periodId, periodDays: nDays, budget, timeSpent: 0, note: '', weekKey: getWeekKey(d) };
    });
    const dates = newSessions.map(s => s.date);
    setSessions(p => [...p.filter(s => !dates.includes(s.date)), ...newSessions]);
    setDayModal(null);
  };

  const totalWorked = sessions.filter(s=>s.validated).length;
  const totalMin = sessions.filter(s=>s.validated).reduce((a,s)=>a+(s.actualMin||0),0);

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <button onClick={prev} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'8px 16px', color:'#888', cursor:'pointer', fontSize:18 }}>‹</button>
        <div style={{ fontSize:18, color:'#f0e6d0', fontFamily:"'Playfair Display', serif", textTransform:'capitalize' }}>
          {new Date(year,month-1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}
        </div>
        <button onClick={next} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'8px 16px', color:'#888', cursor:'pointer', fontSize:18 }}>›</button>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, marginBottom:20 }}>
        {['L','M','M','J','V','S','D'].map((d,i)=><div key={i} style={{ textAlign:'center', fontSize:11, color:'#555', fontWeight:700, padding:'4px 0' }}>{d}</div>)}
        {days.map((d,i) => {
          if (!d) return <div key={i}/>;
          const dateStr=`${vm}-${String(d).padStart(2,'0')}`;
          const s=getS(d); const isToday=dateStr===TODAY; const isPast=dateStr<TODAY;
          let bg='rgba(255,255,255,0.03)', bc='rgba(255,255,255,0.07)', color='#666';
          if (s?.validated) { bg='rgba(92,186,125,0.15)'; bc='rgba(92,186,125,0.3)'; color='#5cba7d'; }
          else if (s?.joker)           { bg='rgba(201,168,76,0.08)'; bc='rgba(201,168,76,0.2)';  color='#c9a84c'; }
          else if (s?.type==='off')     { bg='rgba(224,92,92,0.1)';   bc='rgba(224,92,92,0.25)';  color='#e05c5c'; }
          else if (s?.type==='alternatif') { bg='rgba(123,156,223,0.1)'; bc='rgba(123,156,223,0.25)'; color='#7b9cdf'; }
          else if (s?.absent)          { bg='rgba(224,92,92,0.1)';   bc='rgba(224,92,92,0.2)';   color='#e05c5c'; }
          else if (isToday)            { bg='rgba(201,168,76,0.1)';  bc='rgba(201,168,76,0.4)';  color='#c9a84c'; }
          return (
            <div key={i} onClick={() => { if(s&&s.validated) setSelected(d); else openModal(d); }}
              style={{ borderRadius:10, padding:'6px 4px', textAlign:'center', background:bg, border:`1px solid ${bc}`, cursor:'pointer', minHeight:46, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2 }}>
              <span style={{ fontSize:13, fontWeight:isToday?700:400, color }}>{d}</span>
              {s?.validated && <span style={{ fontSize:9, color:'#5cba7d', fontFamily:'monospace' }}>{s.actualMin}'</span>}
              {s?.joker              && <span style={{ fontSize:11 }}>🃏</span>}
              {s?.type==='off'       && <span style={{ fontSize:11 }}>🚫</span>}
              {s?.type==='alternatif'&& <span style={{ fontSize:11 }}>🎒</span>}
              {s?.absent && !s?.type && <span style={{ fontSize:9, color:'#e05c5c' }}>abs</span>}
            </div>
          );
        })}
      </div>

      {selected && (() => {
        const dateStr=`${vm}-${String(selected).padStart(2,'0')}`;
        const s=sessions.find(ss=>ss.date===dateStr);
        const dl=new Date(dateStr+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        return (
          <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:14, padding:18, marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, color:'#888', letterSpacing:1, textTransform:'uppercase', marginBottom:2 }}>Séance du</div>
                <div style={{ fontSize:15, color:'#f0e6d0', fontFamily:"'Playfair Display', serif", textTransform:'capitalize' }}>{dl}</div>
              </div>
              <button onClick={() => setSelected(null)} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:8, padding:'6px 12px', color:'#888', cursor:'pointer', fontSize:18 }}>×</button>
            </div>
            {(s?.absent||s?.type==='off') && <div style={{ display:'flex', alignItems:'center', gap:10, color:'#e05c5c' }}><span style={{fontSize:24}}>🚫</span><div><div style={{fontWeight:700}}>Off total</div><div style={{fontSize:12,color:'#888',marginTop:2}}>Aucun travail musical possible</div></div></div>}
            {s?.joker   && <div style={{ display:'flex', alignItems:'center', gap:10, color:'#c9a84c' }}><span style={{fontSize:24}}>🃏</span><div><div style={{fontWeight:700}}>Jour joker</div><div style={{fontSize:12,color:'#888',marginTop:2}}>Session annulée</div></div></div>}
            {s?.type==='alternatif' && (
              <div style={{ display:'flex', alignItems:'flex-start', gap:10, color:'#7b9cdf' }}>
                <span style={{fontSize:24}}>🎒</span>
                <div>
                  <div style={{fontWeight:700}}>Travail alternatif</div>
                  <div style={{fontSize:12,color:'#888',marginTop:2}}>Budget période : {s.budget} min · Fait ce jour : {s.timeSpent||0} min</div>
                  {s.note && <div style={{fontSize:12,color:'#c8bfa8',marginTop:4,fontStyle:'italic'}}>{s.note}</div>}
                </div>
              </div>
            )}
            {s?.validated && s.blocks && (
              <>
                <div style={{ display:'flex', gap:10, marginBottom:14 }}>
                  <div style={{ background:'rgba(92,186,125,0.1)', border:'1px solid rgba(92,186,125,0.2)', borderRadius:10, padding:'8px 14px', flex:1, textAlign:'center' }}>
                    <div style={{ fontSize:20, fontWeight:700, color:'#5cba7d', fontFamily:'monospace' }}>{s.actualMin}'</div>
                    <div style={{ fontSize:10, color:'#555', letterSpacing:1 }}>TEMPS RÉEL</div>
                  </div>
                  <div style={{ background:'rgba(201,168,76,0.1)', border:'1px solid rgba(201,168,76,0.2)', borderRadius:10, padding:'8px 14px', flex:1, textAlign:'center' }}>
                    <div style={{ fontSize:20, fontWeight:700, color:'#c9a84c', fontFamily:'monospace' }}>{s.blocks.length}</div>
                    <div style={{ fontSize:10, color:'#555', letterSpacing:1 }}>BLOCS</div>
                  </div>
                </div>
                {s.blocks.map((block,i) => {
                  const cat=CATEGORIES[block.category]||CATEGORIES.gammes;
                  const m=block.validatedMastery&&MASTERY[block.validatedMastery];
                  return (
                    <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background:'rgba(255,255,255,0.03)', borderLeft:'3px solid '+cat.color, borderRadius:8, marginBottom:6 }}>
                      <span style={{fontSize:18}}>{cat.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:cat.color,fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:1}}>{cat.label}</div>
                        <div style={{fontSize:13,color:'#f0e6d0'}}>{block.title}</div>
                        {m&&<div style={{fontSize:11,color:m.color,marginTop:1}}>{m.label}</div>}
                      </div>
                      <div style={{fontSize:13,color:'#c9a84c',fontFamily:'monospace',fontWeight:700}}>{block.actualMin||block.plannedMin}'</div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        );
      })()}

      {/* Day action modal */}
      {dayModal && (
        <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:16, padding:20, marginBottom:16 }}>
          <div style={{ fontSize:15, color:'#f0e6d0', fontFamily:"'Playfair Display', serif", marginBottom:16, textTransform:'capitalize' }}>
            {new Date(dayModal.dateStr+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
          </div>

          {/* Current status if any */}
          {dayModal.existing && (
            <div style={{ fontSize:12, color:'#888', marginBottom:14, padding:'8px 12px', background:'rgba(255,255,255,0.03)', borderRadius:8 }}>
              Actuellement : {dayModal.existing.type==='off'?'🚫 Off total':dayModal.existing.type==='alternatif'?'🎒 Travail alternatif':dayModal.existing.joker?'🃏 Joker':'—'}
              <button onClick={() => clearDay(dayModal.dateStr)} style={{ marginLeft:12, fontSize:11, color:'#e05c5c', background:'transparent', border:'none', cursor:'pointer' }}>× Supprimer</button>
            </div>
          )}

          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {/* Off total */}
            <button onClick={() => markOff(dayModal.dateStr)} style={{ padding:'14px 16px', background:'rgba(224,92,92,0.1)', border:'1px solid rgba(224,92,92,0.25)', borderRadius:12, color:'#e05c5c', fontWeight:600, fontSize:14, cursor:'pointer', textAlign:'left', display:'flex', alignItems:'center', gap:12 }}>
              <span style={{fontSize:22}}>🚫</span>
              <div>
                <div style={{fontWeight:700}}>Off total</div>
                <div style={{fontSize:11,opacity:0.7,marginTop:2}}>Impossible de travailler la musique</div>
              </div>
            </button>

            {/* Alternatif */}
            <div style={{ background:'rgba(123,156,223,0.08)', border:'1px solid rgba(123,156,223,0.2)', borderRadius:12, padding:'14px 16px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                <span style={{fontSize:22}}>🎒</span>
                <div>
                  <div style={{fontWeight:700,color:'#7b9cdf',fontSize:14}}>Travail alternatif</div>
                  <div style={{fontSize:11,color:'#555',marginTop:2}}>Synthé, lecture, théorie — budget 10 min/jour</div>
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{fontSize:12,color:'#888'}}>Nombre de jours :</span>
                <div style={{display:'flex',gap:6}}>
                  {[1,2,3,4,5,6,7].map(n => (
                    <button key={n} onClick={() => setAltDays(n)} style={{ width:32,height:32,borderRadius:8,border:'1px solid',fontSize:13,fontWeight:700,cursor:'pointer',background:altDays===n?'rgba(123,156,223,0.25)':'rgba(255,255,255,0.04)',borderColor:altDays===n?'#7b9cdf':'rgba(255,255,255,0.1)',color:altDays===n?'#7b9cdf':'#555' }}>{n}</button>
                  ))}
                </div>
              </div>
              <button onClick={() => markAlternatif(dayModal.dateStr, altDays)} style={{ marginTop:12,width:'100%',padding:'10px',background:'rgba(123,156,223,0.15)',border:'1px solid rgba(123,156,223,0.3)',borderRadius:10,color:'#7b9cdf',fontWeight:700,fontSize:13,cursor:'pointer' }}>
                Marquer {altDays} jour{altDays>1?'s':''} (budget : {altDays*(settings?.alternatifDailyMin||10)} min)
              </button>
            </div>

            <button onClick={() => setDayModal(null)} style={{ padding:'10px',background:'transparent',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,color:'#555',cursor:'pointer',fontSize:13 }}>Annuler</button>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
        {[{label:'Sessions',value:totalWorked,icon:'📅'},{label:'Minutes',value:totalMin+"'",icon:'⏱'},{label:'Jokers',value:sessions.filter(s=>s.joker).length,icon:'🃏'}].map((s,i)=>(
          <div key={i} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'14px 12px', textAlign:'center' }}>
            <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:22,fontWeight:700,color:'#c9a84c',fontFamily:'monospace'}}>{s.value}</div>
            <div style={{fontSize:11,color:'#555'}}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({ settings, setSettings }) {
  const [form, setForm] = useState(settings);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const saveAndSchedule = () => {
    setSettings(form);
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'SCHEDULE_NOTIF',
        enabled: form.reminderEnabled,
        hour: form.reminderHour,
        minute: form.reminderMinute,
      });
    }
  };

  const requestNotifPermission = async () => {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') set('reminderEnabled', true);
  };

  return (
    <div>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Budgets hebdomadaires</div>
        {[
          {key:'gammesDailyMin',label:'🎼 Gammes (min/jour)',max:20},
          {key:'techJazzWeeklyMin',label:'🎨 Langage musical (min/semaine)',max:120},
          {key:'morceauxWeeklyMin',label:'🎵 Morceaux (min/semaine)',max:180},
          {key:'revisionsWeeklyMin',label:'🔁 Révisions (min/semaine)',max:60},
        ].map(({key,label,max}) => (
          <div key={key} style={{ marginBottom:16 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
              <label style={{ fontSize:13, color:'#f0e6d0' }}>{label}</label>
              <span style={{ fontSize:13, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>{form[key]} min</span>
            </div>
            <input type="range" min="5" max={max} step="5" value={form[key]} onChange={e=>set(key,parseInt(e.target.value))} style={{ width:'100%' }} />
          </div>
        ))}
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Rythme</div>

        <div style={{ marginBottom:16 }}>
          <label style={{ fontSize:13, color:'#f0e6d0', display:'block', marginBottom:8 }}>Premier jour de la semaine</label>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            {[['Dim',0],['Lun',1],['Mar',2],['Mer',3],['Jeu',4],['Ven',5],['Sam',6]].map(([label,val])=>(
              <button key={val} type="button" onClick={()=>set('weekStartDay',val)}
                style={{ padding:'6px 12px', borderRadius:20, border:'1px solid', fontSize:12, fontWeight:600, cursor:'pointer',
                  background: form.weekStartDay===val?'rgba(201,168,76,0.2)':'rgba(255,255,255,0.04)',
                  borderColor: form.weekStartDay===val?'#c9a84c':'rgba(255,255,255,0.1)',
                  color: form.weekStartDay===val?'#c9a84c':'#555' }}>
                {label}
              </button>
            ))}
          </div>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          {[{key:'workDaysPerWeek',label:'Jours de pratique / sem.',min:3,max:7},{key:'revisionDaysPerWeek',label:'Révisions / sem.',min:1,max:4}].map(({key,label,min,max})=>(
            <div key={key}>
              <label style={{ fontSize:12, color:'#888', display:'block', marginBottom:4 }}>{label}</label>
              <input type="number" min={min} max={max} value={form[key]} onChange={e=>set(key,parseInt(e.target.value))}
                style={{ width:'100%', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'12px 14px', color:'#f0e6d0', fontSize:16, fontFamily:'monospace', outline:'none' }} />
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Rappel quotidien 🔔</div>
        <div style={{ background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:16 }}>
          {Notification.permission !== 'granted' ? (
            <button onClick={requestNotifPermission} style={{ width:'100%', padding:'12px', background:'rgba(201,168,76,0.1)', border:'1px solid rgba(201,168,76,0.3)', borderRadius:10, color:'#c9a84c', fontWeight:600, fontSize:14, cursor:'pointer' }}>
              🔔 Autoriser les notifications
            </button>
          ) : (
            <>
              <label style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', marginBottom:14 }}>
                <input type="checkbox" checked={form.reminderEnabled} onChange={e=>set('reminderEnabled',e.target.checked)} style={{ accentColor:'#c9a84c', width:18, height:18 }} />
                <span style={{ fontSize:14, color:'#f0e6d0' }}>Activer le rappel</span>
              </label>
              {form.reminderEnabled && (
                <div>
                  <label style={{ fontSize:12, color:'#888', display:'block', marginBottom:6 }}>Heure du rappel</label>
                  <input type="time" value={`${String(form.reminderHour).padStart(2,'0')}:${String(form.reminderMinute).padStart(2,'0')}`}
                    onChange={e => { const [h,m]=e.target.value.split(':'); set('reminderHour',parseInt(h)); set('reminderMinute',parseInt(m)); }}
                    style={{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'10px 14px', color:'#f0e6d0', fontSize:16, outline:'none', fontFamily:'monospace' }} />
                </div>
              )}
            </>
          )}
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Travail alternatif</div>
        <div style={{ marginBottom:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
            <label style={{ fontSize:13, color:'#f0e6d0' }}>🎒 Budget par jour (min)</label>
            <span style={{ fontSize:13, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>{form.alternatifDailyMin} min</span>
          </div>
          <input type="range" min="5" max="30" step="5" value={form.alternatifDailyMin} onChange={e=>set('alternatifDailyMin',parseInt(e.target.value))} style={{ width:'100%' }} />
          <div style={{ fontSize:11, color:'#555', marginTop:4 }}>Budget total = ce temps × nombre de jours de la période</div>
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Garde-fous</div>

        <div style={{ marginBottom:16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
            <label style={{ fontSize:13, color:'#f0e6d0' }}>⏱ Cap session max</label>
            <span style={{ fontSize:13, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>{form.sessionCapMin} min</span>
          </div>
          <input type="range" min="30" max="60" step="5" value={form.sessionCapMin} onChange={e=>set('sessionCapMin',parseInt(e.target.value))} style={{ width:'100%' }} />
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:3 }}>
            <span style={{ fontSize:10, color:'#555' }}>30 min</span>
            <span style={{ fontSize:10, color:'#555' }}>60 min</span>
          </div>
        </div>

        <div style={{ fontSize:13, color:'#f0e6d0', marginBottom:10 }}>Relance auto si non vu depuis :</div>
        {[
          {key:'maxDaysUnseenPriority',   label:'⭐ Prioritaire', color:'#c9a84c', min:2,  max:14 },
          {key:'maxDaysUnseenNormal',     label:'— Normal',       color:'#888',    min:5,  max:30 },
          {key:'maxDaysUnseenOccasional', label:'🌙 Occasionnel', color:'#7b9cdf', min:14, max:90 },
        ].map(({key,label,color,min,max}) => (
          <div key={key} style={{ marginBottom:14 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
              <label style={{ fontSize:13, color }}>{label}</label>
              <span style={{ fontSize:13, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>{form[key]} jours</span>
            </div>
            <input type="range" min={min} max={max} step="1" value={form[key]} onChange={e=>set(key,parseInt(e.target.value))} style={{ width:'100%' }} />
          </div>
        ))}
      </div>

      <button onClick={saveAndSchedule} style={{ width:'100%', padding:'14px', background:'#c9a84c', border:'none', borderRadius:12, color:'#1a1a18', fontWeight:700, fontSize:15, cursor:'pointer' }}>
        Enregistrer
      </button>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [items,    setItems,    il] = useStorage('pm_items',    DEFAULT_ITEMS);
  const [sessions, setSessions, sl] = useStorage('pm_sessions', []);
  const [settings, setSettings, stl] = useStorage('pm_settings', DEFAULT_SETTINGS);
  const [tab, setTab] = useState('today');
  const [saveStatus, setSaveStatus] = useState(null); // null | 'saving' | 'saved' | 'error'

  useEffect(() => {
    DriveDB.onSaveSuccess = () => {
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(null), 2000);
    };
    DriveDB.onSaveError = () => {
      setSaveStatus('error');
    };
    return () => { DriveDB.onSaveSuccess = null; DriveDB.onSaveError = null; };
  }, []);

  // Schedule notification on load
  useEffect(() => {
    if (il && stl && settings.reminderEnabled && 'serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(sw => {
        sw.active && sw.active.postMessage({ type: 'SCHEDULE_NOTIF', enabled: true, hour: settings.reminderHour, minute: settings.reminderMinute });
      });
    }
  }, [il, stl]);

  if (!il || !sl || !stl) return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:36, marginBottom:12 }}>♩</div>
        <div style={{ color:'#c9a84c', fontFamily:'monospace', letterSpacing:2 }}>Chargement…</div>
      </div>
    </div>
  );

  const TABS = [{id:'today',label:"Aujourd'hui",icon:'🎯'},{id:'library',label:'Bibliothèque',icon:'📚'},{id:'calendar',label:'Calendrier',icon:'📅'},{id:'settings',label:'Réglages',icon:'⚙️'}];
  const weekSessions = sessions.filter(s=>s.validated&&s.weekKey===getWeekKey(new Date(), settings.weekStartDay??4)).length;
  const weekJoker = sessions.some(s=>s.joker&&s.weekKey===getWeekKey(new Date(), settings.weekStartDay??4));

  return (
    <div style={{ minHeight:'100vh', minHeight:'100dvh', background:'#1a1a18', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'20px 16px 0', borderBottom:'1px solid rgba(255,255,255,0.06)', background:'#1a1a18', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:16 }}>
          <div>
            <div style={{ fontSize:20, fontFamily:"'Playfair Display', serif", color:'#f0e6d0', lineHeight:1 }}>
              <em>Cadence</em> <span style={{ color:'#c9a84c' }}>♩</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:2 }}>
              <div style={{ fontSize:10, color:'#555', letterSpacing:2, textTransform:'uppercase' }}>Journal de pratique</div>
              {saveStatus === 'saving' && <div style={{ width:6, height:6, borderRadius:'50%', background:'#e0a83a' }} title="Sauvegarde..." />}
              {saveStatus === 'saved'  && <div style={{ width:6, height:6, borderRadius:'50%', background:'#5cba7d' }} title="Sauvegardé ✓" />}
              {saveStatus === 'error'  && <div style={{ width:6, height:6, borderRadius:'50%', background:'#e05c5c' }} title="Erreur de sauvegarde !" />}
            </div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:10, color:'#555' }}>Cette semaine</div>
            <div style={{ fontSize:15, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>
              {weekSessions}<span style={{ fontSize:10, color:'#555', marginLeft:3 }}>sessions</span>
              {weekJoker && <span style={{ fontSize:13, marginLeft:5 }}>🃏</span>}
            </div>
          </div>
        </div>
        <div style={{ display:'flex' }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, padding:'8px 2px', background:'transparent', border:'none', borderBottom:tab===t.id?'2px solid #c9a84c':'2px solid transparent', color:tab===t.id?'#c9a84c':'#555', cursor:'pointer', fontSize:10, fontWeight:600, letterSpacing:0.5 }}>
              <div style={{ fontSize:18, marginBottom:2 }}>{t.icon}</div>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, padding:'20px 16px 80px', overflowY:'auto' }}>
        {tab==='today'    && <TodayView    items={items} settings={settings} sessions={sessions} setSessions={setSessions} setItems={setItems} />}
        {tab==='library'  && <LibraryView  items={items} setItems={setItems} />}
        {tab==='calendar' && <CalendarView sessions={sessions} setSessions={setSessions} settings={settings} />}
        {tab==='settings' && <SettingsView settings={settings} setSettings={setSettings} />}
      </div>
    </div>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    const t   = sessionStorage.getItem('cadence_token');
    const exp = sessionStorage.getItem('cadence_expiry');
    if (t && exp && Date.now() < parseInt(exp) - 60000) {
      DriveDB.setToken(t);
      onAuth();
    }
  }, []);

  const signIn = (silent = false) => {
    if (!silent) { setLoading(true); setError(null); }
    try {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: resp => {
          if (resp.error) {
            if (!silent) { setError('Connexion échouée. Réessaie.'); setLoading(false); }
            return;
          }
          DriveDB.setToken(resp.access_token);
          sessionStorage.setItem('cadence_token', resp.access_token);
          sessionStorage.setItem('cadence_expiry', String(Date.now() + resp.expires_in * 1000));
          // Flush any pending saves after token refresh
          DriveDB.flushPendingSaves().catch(console.error);
          if (!silent) onAuth();
        }
      });
      // Silent refresh (no popup) vs full login
      client.requestAccessToken({ prompt: silent ? 'none' : '' });
    } catch(e) { if (!silent) { setError('Google non disponible.'); setLoading(false); } }
  };

  // Auto-refresh token 5 min before expiry
  useEffect(() => {
    const check = setInterval(() => {
      const expiry = parseInt(sessionStorage.getItem('cadence_expiry') || '0');
      if (expiry && Date.now() > expiry - 5 * 60 * 1000) {
        signIn(true); // silent refresh
      }
    }, 60000); // check every minute
    return () => clearInterval(check);
  }, []);

  return (
    <div style={{ minHeight:'100vh', minHeight:'100dvh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div style={{ textAlign:'center', maxWidth:300, width:'100%' }}>
        <div style={{ fontSize:72, marginBottom:12, lineHeight:1 }}>♩</div>
        <div style={{ fontSize:34, fontFamily:"'Playfair Display', serif", color:'#f0e6d0', marginBottom:6 }}><em>Cadence</em></div>
        <div style={{ fontSize:12, color:'#555', letterSpacing:2, textTransform:'uppercase', marginBottom:52 }}>Journal de pratique musicale</div>
        <button onClick={signIn} disabled={loading} style={{ width:'100%', padding:'16px 24px', background:loading?'rgba(255,255,255,0.04)':'#c9a84c', border:'none', borderRadius:16, color:loading?'#555':'#1a1a18', fontWeight:700, fontSize:16, cursor:loading?'default':'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:10 }}>
          <span>🔑</span>{loading?'Connexion…':'Se connecter avec Google'}
        </button>
        {error && <div style={{ marginTop:14, color:'#e05c5c', fontSize:13 }}>{error}</div>}
        <div style={{ marginTop:20, fontSize:11, color:'#666', lineHeight:1.6 }}>
          ⚠️ La connexion Google expire après 1h.<br/>Si tes données ne se sauvegardent plus, reconnecte-toi.
        </div>
        <div style={{ marginTop:32, fontSize:11, color:'#444', lineHeight:1.7 }}>
          Tes données sont stockées dans ton Google Drive personnel.<br/>Personne d'autre n'y a accès.
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function AppWrapper() {
  const [authed, setAuthed] = useState(false);
  return authed ? <App /> : <AuthScreen onAuth={() => setAuthed(true)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper />);

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/cadence/sw.js', { scope: '/cadence/' })
      .then(reg => console.log('SW registered', reg.scope))
      .catch(err => console.log('SW error', err));
  });
}
</script>
