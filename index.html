// ─── CONFIG ───────────────────────────────────────────────────────────────────

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const MASTERY = {
  non_maitrise: { label: "Non maîtrisé",     color: "#e05c5c", weight: 3, timeMin: 15 },
  fragile:      { label: "Maîtrise fragile",  color: "#e0a83a", weight: 2, timeMin: 12 },

const FREQUENCY_WEIGHT = { priority: 5, normal: 2, occasional: 0.3 };
const MAX_DAYS_UNSEEN   = { priority: 5, normal: 12, occasional: 45 };
const SESSION_MAX_MIN   = 50;

const CATEGORIES = {

  langage_musical:{ label: "Langage musical", icon: "🎨", color: "#c47fdf" },

  morceauxWeeklyMin: 60, revisionsWeeklyMin: 16, revisionDaysPerWeek: 2,
  reminderEnabled: false, reminderHour: 19, reminderMinute: 0,
};

// ─── DRIVE STORAGE ────────────────────────────────────────────────────────────
const DriveDB = {
  token: null, fileIds: {}, cache: {},
  setToken(t) { this.token = t; },

  async req(url, opts = {}) {
    const res = await fetch(url, {
      ...opts,
      headers: { 'Authorization': `Bearer ${this.token}`, ...(opts.headers || {}) }
    });
    if (res.status === 401) throw new Error('TOKEN_EXPIRED');
    return res;
  },

  async getFileId(name) {
    if (this.fileIds[name]) return this.fileIds[name];
    const r = await this.req(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'${name}'&fields=files(id)`
    );
    const d = await r.json();
    if (d.files && d.files[0]) { this.fileIds[name] = d.files[0].id; return d.files[0].id; }
    return null;
  },

  async get(name) {
    if (this.cache[name] !== undefined) return this.cache[name];
    const id = await this.getFileId(name);
    if (!id) { this.cache[name] = null; return null; }
    const r = await this.req(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
    const data = await r.json();
    this.cache[name] = data;
    return data;
  },

  async set(name, data) {
    this.cache[name] = data;
    const body = JSON.stringify(data);
    const id = await this.getFileId(name);
    if (id) {
      await this.req(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body,
      });
    } else {
      const bnd = 'cadencebnd';
      const meta = JSON.stringify({ name, parents: ['appDataFolder'] });
      const mp = `--${bnd}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${bnd}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${bnd}--`;
      const r = await this.req(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`, {
        method: 'POST', headers: { 'Content-Type': `multipart/related; boundary=${bnd}` }, body: mp,
      });
      const f = await r.json();
      this.fileIds[name] = f.id;
    }
  },
};

// ─── STORAGE HOOK ─────────────────────────────────────────────────────────────
function useStorage(key, defaultVal) {
  const [val, setVal] = useState(defaultVal);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        let data = await DriveDB.get(key + '.json');
        if (data !== null && data !== undefined) {
          if (key === 'pm_items' && Array.isArray(data))
            data = data.map(i => i.category === 'technique_jazz' ? { ...i, category: 'langage_musical' } : i);
          if (key === 'pm_sessions' && Array.isArray(data))
            data = data.map(s => ({ ...s, blocks: Array.isArray(s.blocks) ? s.blocks.map(b => b.category === 'technique_jazz' ? { ...b, category: 'langage_musical' } : b) : s.blocks }));
          setVal(data);
        }
      } catch(e) { console.error('Drive read:', e); }
      setLoaded(true);
    })();
  }, []);

  const save = useCallback((updater) => {
    setVal(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      DriveDB.set(key + '.json', next).catch(console.error);
      return next;
    });
  }, [key]);

  return [val, save, loaded];
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function toDateStr(d) { return (d || new Date()).toISOString().slice(0, 10); }
function getWeekKey(date) {
  const d = new Date(date || new Date()); d.setHours(0,0,0,0);
  const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff); return d.toISOString().slice(0, 10);
}
const TODAY = toDateStr();

function compressImage(file, maxW = 1200, q = 0.75) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const r = Math.min(1, maxW / img.width);
        canvas.width = Math.round(img.width * r); canvas.height = Math.round(img.height * r);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL('image/jpeg', q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── ALGORITHM ───────────────────────────────────────────────────────────────
function pickItem(items, dateStr) {
  if (!items.length) return null;
  const weights = items.map(item => {
    const freq = item.frequency || 'normal';
    const daysSince = item.lastWorked
      ? Math.floor((new Date(dateStr) - new Date(item.lastWorked)) / 86400000) : 999;
    if (daysSince >= MAX_DAYS_UNSEEN[freq]) return 999;
    return FREQUENCY_WEIGHT[freq] * ((MASTERY[item.mastery] || MASTERY.fragile).weight) * Math.min(daysSince + 1, 10);
  });
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) { r -= weights[i]; if (r <= 0) return items[i]; }
  return items[items.length - 1];
}

function isRevisionDay(dateStr, revDays, sessions) {
  const wk = getWeekKey(new Date(dateStr));
  return sessions.filter(s => s.weekKey === wk && s.hasRevision && s.date !== dateStr).length < revDays;
}

function generateSession(items, settings, sessions, dateStr) {
  const blocks = [];
  const gamme = pickItem(items.filter(i => i.category === 'gammes' && i.isActive), dateStr);
  if (gamme) blocks.push({ itemId: gamme.id, title: gamme.title, category: 'gammes', plannedMin: settings.gammesDailyMin, validated: false });

  const lang = pickItem(items.filter(i => i.category === 'langage_musical' && i.isActive), dateStr);
  if (lang) blocks.push({ itemId: lang.id, title: lang.title, category: 'langage_musical', plannedMin: Math.round(settings.techJazzWeeklyMin / settings.workDaysPerWeek), validated: false });

  const morceau = pickItem(items.filter(i => i.category === 'morceau' && i.isActive), dateStr);
  if (morceau) blocks.push({ itemId: morceau.id, title: morceau.title, category: 'morceau', plannedMin: (MASTERY[morceau.mastery] || MASTERY.fragile).timeMin, validated: false });

  const doRevision = isRevisionDay(dateStr, settings.revisionDaysPerWeek, sessions);
  if (doRevision) {
    const rev = [...items.filter(i => i.category === 'morceau' && !i.isActive)]
      .sort((a,b) => (a.lastRevised ? new Date(a.lastRevised) : new Date(0)) - (b.lastRevised ? new Date(b.lastRevised) : new Date(0)))[0];
    if (rev) blocks.push({ itemId: rev.id, title: rev.title, category: 'revision', plannedMin: Math.round(settings.revisionsWeeklyMin / settings.revisionDaysPerWeek), validated: false });
  }

  let totalMin = blocks.reduce((a,b) => a+b.plannedMin, 0);
  if (totalMin > SESSION_MAX_MIN) {
    const excess = totalMin - SESSION_MAX_MIN;
    const scalable = blocks.filter(b => b.category !== 'gammes');
    const scalableTotal = scalable.reduce((a,b) => a+b.plannedMin, 0);
    if (scalableTotal > 0) scalable.forEach(b => { b.plannedMin = Math.max(5, Math.round(b.plannedMin * (1 - excess / scalableTotal))); });
    totalMin = blocks.reduce((a,b) => a+b.plannedMin, 0);
  }
  return { blocks, totalMin, weekKey: getWeekKey(new Date(dateStr)), hasRevision: doRevision };
}

          </div>
          <button onClick={() => setLb(null)} style={{ position: 'absolute', top: 16, right: 16, width: 32, height: 32, borderRadius: '50%', background: '#e05c5c', border: 'none', color: '#fff', fontSize: 18, cursor: 'pointer', fontWeight: 700 }}>×</button>

// ─── TIMER HOOK ──────────────────────────────────────────────────────────────
function useTimer(plannedMin) {
  const [secondsLeft, setSecondsLeft] = useState(plannedMin * 60);
  const [running, setRunning] = useState(false);
  const [finished, setFinished] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    setSecondsLeft(plannedMin * 60);
    setRunning(false);
    setFinished(false);
  }, [plannedMin]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setSecondsLeft(s => {
          if (s <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            setFinished(true);
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const toggle = () => { if (!finished) setRunning(r => !r); };
  const reset  = () => { setRunning(false); setFinished(false); setSecondsLeft(plannedMin * 60); };

  const mm = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
  const ss = String(secondsLeft % 60).padStart(2, '0');
  const pct = 1 - secondsLeft / (plannedMin * 60);

  return { mm, ss, pct, running, finished, toggle, reset };
}

// ─── BLOCK CARD ───────────────────────────────────────────────────────────────
function BlockCard({ block, items, onValidate }) {
  const cat = CATEGORIES[block.category] || CATEGORIES.gammes;

    setActualMin(String(block.actualMin || block.plannedMin));

    <div style={{ background: done ? 'rgba(92,186,125,0.06)' : 'rgba(255,255,255,0.03)', border: '1px solid ' + (done ? 'rgba(92,186,125,0.25)' : 'rgba(255,255,255,0.07)'), borderLeft: '3px solid ' + (done ? '#5cba7d' : cat.color), borderRadius: 14, marginBottom: 10, overflow: 'hidden' }}>

        </button>
        <span style={{ fontSize: 22 }}>{cat.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11, color: done ? '#5cba7d' : cat.color, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 1 }}>{cat.label}</div>
          <div style={{ fontSize: 14, color: done ? '#7abf96' : '#f0e6d0' }}>{block.title}</div>
          {done && (

              <span style={{ fontSize: 10, color: '#555', cursor: 'pointer' }} onClick={handleOpen}>✎ modifier</span>

        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>

          {hasNotes && (
            <button onClick={e => { e.stopPropagation(); setShowNotes(s => !s); }} style={{ padding: '3px 8px', background: showNotes ? 'rgba(201,168,76,0.15)' : 'rgba(255,255,255,0.05)', border: '1px solid', borderColor: showNotes ? 'rgba(201,168,76,0.3)' : 'rgba(255,255,255,0.1)', borderRadius: 6, color: showNotes ? '#c9a84c' : '#555', cursor: 'pointer', fontSize: 11 }}>
              {item.images && item.images.length > 0 ? '📷' : '📝'}
            </button>
          )}
        </div>
      </div>

      {/* Timer */}
      {!done && (
        <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', padding: '10px 16px', background: 'rgba(0,0,0,0.1)', display: 'flex', alignItems: 'center', gap: 12 }}>
          {/* Circular progress */}
          <div style={{ position: 'relative', width: 48, height: 48, flexShrink: 0 }}>
            <svg width="48" height="48" viewBox="0 0 48 48">
              <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="3"/>

                stroke={timer.finished ? '#5cba7d' : timer.running ? cat.color : 'rgba(255,255,255,0.2)'}

                strokeDasharray={`${2 * Math.PI * 20}`}
                strokeDashoffset={`${2 * Math.PI * 20 * (1 - timer.pct)}`}

          </div>
        </div>
      )}
    </div>
  );
}

// ─── TODAY VIEW ───────────────────────────────────────────────────────────────
function TodayView({ items, settings, sessions, setSessions, setItems }) {
  const existing = sessions.find(s => s.date === TODAY);
  const [session, setSession] = useState(existing || null);
  const [generated, setGenerated] = useState(!!existing);
  const thisWeek = getWeekKey();
  const jokerUsed = sessions.some(s => s.weekKey === thisWeek && s.joker && s.date !== TODAY);
  const isJoker = !!existing?.joker;

  useEffect(() => {
    if (!generated && items.length > 0) {
      const s = generateSession(items, settings, sessions, TODAY);
      setSession({ ...s, date: TODAY, validated: false });
      setGenerated(true);
    }
  }, [items, settings, sessions, generated]);

  const handleJoker = () => {
    const j = { date: TODAY, weekKey: thisWeek, joker: true, validated: false };
    setSession(j);
    setSessions(p => [...p.filter(s => s.date !== TODAY), j]);
  };

  const handleBlockValidate = (itemId, actualMin, newMastery, cancel) => {
    setSession(prev => {
      if (!prev) return prev;
      const blocks = prev.blocks.map(b => {
        if (b.itemId !== itemId) return b;
        if (cancel) return { ...b, validated: false, actualMin: null, validatedMastery: null };
        return { ...b, validated: true, actualMin, validatedMastery: newMastery };
      });
      const allDone = blocks.every(b => b.validated);
      const totalActual = blocks.reduce((a,b) => a+(b.actualMin||0), 0);
      const updated = { ...prev, blocks, validated: allDone, actualMin: totalActual };
      setSessions(p => [...p.filter(s => s.date !== TODAY), updated]);
      if (!cancel) {
        setItems(p => p.map(item => {
          if (item.id !== itemId) return item;
          const block = blocks.find(b => b.itemId === itemId);
          return { ...item, mastery: newMastery||item.mastery, lastWorked: TODAY, lastRevised: block?.category==='revision'?TODAY:item.lastRevised };
        }));
      }
      return updated;
    });
  };

  const totalPlanned = session?.blocks?.reduce((a,b) => a+b.plannedMin, 0) ?? 0;
  const doneCount = session?.blocks?.filter(b => b.validated).length ?? 0;
  const totalCount = session?.blocks?.length ?? 0;
  const allDone = doneCount > 0 && doneCount === totalCount;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: '#888', letterSpacing: 2, textTransform: 'uppercase' }}>Aujourd'hui</div>
          <div style={{ fontSize: 20, color: '#f0e6d0', fontFamily: "'Playfair Display', serif" }}>
            {new Date(TODAY+'T12:00:00').toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}
          </div>
        </div>
        {!isJoker && (
          <div style={{ textAlign: 'center', background: 'rgba(201,168,76,0.1)', border: '1px solid rgba(201,168,76,0.3)', borderRadius: 12, padding: '8px 16px' }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: '#c9a84c', fontFamily: 'monospace' }}>{totalPlanned}'</div>
            <div style={{ fontSize: 10, color: '#888', letterSpacing: 1 }}>PLANIFIÉ</div>
          </div>
        )}
      </div>

      {!isJoker && totalCount > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 12, color: '#888' }}>Progression</span>
            <span style={{ fontSize: 12, color: allDone?'#5cba7d':'#c9a84c', fontFamily: 'monospace', fontWeight: 700 }}>{doneCount}/{totalCount}</span>
          </div>
          <div style={{ height: 4, background: 'rgba(255,255,255,0.07)', borderRadius: 4, overflow: 'hidden' }}>
            <div style={{ height: '100%', borderRadius: 4, width: (doneCount/totalCount*100)+'%', background: allDone?'#5cba7d':'#c9a84c', transition: 'width 0.4s ease' }} />
          </div>
        </div>
      )}

      {isJoker && (
        <div style={{ background: 'rgba(201,168,76,0.08)', border: '1px solid rgba(201,168,76,0.25)', borderRadius: 14, padding: '18px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 14 }}>
          <span style={{ fontSize: 32 }}>🃏</span>
          <div>
            <div style={{ color: '#c9a84c', fontWeight: 700, fontSize: 16 }}>Jour joker — repos mérité</div>
            <div style={{ color: '#888', fontSize: 13, marginTop: 3 }}>Pas de session aujourd'hui. À demain !</div>
          </div>
        </div>
      )}

      {allDone && (
        <div style={{ background: 'rgba(92,186,125,0.1)', border: '1px solid rgba(92,186,125,0.3)', borderRadius: 14, padding: '16px 18px', marginBottom: 20, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 28 }}>🎉</span>
          <div>
            <div style={{ color: '#5cba7d', fontWeight: 700, fontSize: 15 }}>Session complète !</div>
            <div style={{ color: '#888', fontSize: 13, marginTop: 2 }}>{session.blocks.reduce((a,b)=>a+(b.actualMin||0),0)} min · {doneCount} blocs</div>
          </div>
        </div>
      )}

      {!isJoker && session?.blocks?.map((block, i) => (
        <BlockCard key={i} block={block} items={items} onValidate={handleBlockValidate} />
      ))}

      {!isJoker && session && !allDone && (
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
          {jokerUsed
            ? <div style={{ textAlign: 'center', fontSize: 12, color: '#555' }}>🃏 Joker déjà utilisé cette semaine</div>
            : <button onClick={handleJoker} style={{ width: '100%', padding: '12px', background: 'transparent', border: '1px solid rgba(201,168,76,0.2)', borderRadius: 12, color: '#888', fontWeight: 600, fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <span>🃏</span> Joker
              </button>
          }
        </div>
      )}

      {!session && (
        <div style={{ textAlign: 'center', padding: 40, color: '#555' }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🎵</div>
          <div>Ajoute des exercices dans la Bibliothèque.</div>
        </div>
      )}
    </div>
  );
}

// ─── LIBRARY VIEW ─────────────────────────────────────────────────────────────
function LibraryView({ items, setItems }) {
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState('all');
  const [expandedNotes, setExpandedNotes] = useState({});

  const match = i => filter==='all'||( filter==='active'&&i.isActive)||(filter==='priority'&&i.frequency==='priority')||(filter==='occasional'&&i.frequency==='occasional');

  const addItem = form => { const n = { ...form, id: Date.now().toString(), lastWorked: null, lastRevised: null }; if (form.category!=='morceau') n.isActive=true; setItems(p=>[...p,n]); setAdding(false); };
  const updateItem = form => { setItems(p=>p.map(i=>i.id===editing.id?{...i,...form}:i)); setEditing(null); };
  const deleteItem = id => setItems(p=>p.filter(i=>i.id!==id));
  const cycleFreq = id => { const c={normal:'priority',priority:'occasional',occasional:'normal'}; setItems(p=>p.map(i=>i.id===id?{...i,frequency:c[i.frequency||'normal']}:i)); };
  const toggleActive = id => setItems(p=>p.map(i=>i.id===id?{...i,isActive:!i.isActive}:i));

  return (
    <div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
        {[{key:'all',label:'Tout'},{key:'active',label:'En cours'},{key:'priority',label:'⭐ Prioritaires'},{key:'occasional',label:'🌙 Occasionnels'}].map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)} style={{ padding: '6px 14px', borderRadius: 20, border: '1px solid', fontSize: 12, fontWeight: 600, cursor: 'pointer', background: filter===f.key?'#c9a84c':'transparent', color: filter===f.key?'#1a1a18':'#888', borderColor: filter===f.key?'#c9a84c':'rgba(255,255,255,0.12)' }}>{f.label}</button>
        ))}
        <button onClick={() => setAdding(true)} style={{ marginLeft: 'auto', padding: '6px 16px', borderRadius: 20, background: '#c9a84c', border: 'none', color: '#1a1a18', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>+ Ajouter</button>
      </div>

      {adding && <ItemForm onSave={addItem} onCancel={() => setAdding(false)} />}

      {Object.entries(CATEGORIES).map(([cat, catInfo]) => {
        const catItems = items.filter(i => i.category===cat && match(i));
        if (!catItems.length) return null;
        return (
          <div key={cat} style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 18 }}>{catInfo.icon}</span>
              <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: catInfo.color, textTransform: 'uppercase' }}>{catInfo.label}</span>
              <span style={{ fontSize: 12, color: '#555' }}>({catItems.length})</span>
            </div>
            {catItems.map(item => (
              <div key={item.id}>
                {editing?.id===item.id
                  ? <ItemForm initial={item} onSave={updateItem} onCancel={() => setEditing(null)} />
                  : (
                    <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 12, padding: '12px 14px', marginBottom: 8 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                            <span style={{ color: '#f0e6d0', fontSize: 14 }}>{item.title}</span>
                            {item.frequency==='priority' && <span style={{ fontSize: 10, background: 'rgba(201,168,76,0.2)', color: '#c9a84c', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>⭐ PRIORITAIRE</span>}
                            {item.frequency==='occasional' && <span style={{ fontSize: 10, background: 'rgba(123,156,223,0.2)', color: '#7b9cdf', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>🌙 OCCASIONNEL</span>}
                            {item.category==='morceau'&&item.isActive && <span style={{ fontSize: 10, background: 'rgba(92,186,125,0.2)', color: '#5cba7d', padding: '2px 7px', borderRadius: 10, fontWeight: 700 }}>EN COURS</span>}
                          </div>
                          {(() => {
                            const freq = item.frequency||'normal'; const maxDays = MAX_DAYS_UNSEEN[freq];
                            const daysSince = item.lastWorked ? Math.floor((new Date(TODAY)-new Date(item.lastWorked))/86400000) : null;

                            {item.frequency==='priority'?'⭐':item.frequency==='occasional'?'🌙':'—'}
                          </button>
                          <button onClick={() => setEditing(item)} style={{ padding: '5px 10px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, color: '#888', cursor: 'pointer', fontSize: 13 }}>✎</button>
                          <button onClick={() => deleteItem(item.id)} style={{ padding: '5px 10px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 8, color: '#e05c5c', cursor: 'pointer', fontSize: 13 }}>×</button>
                        </div>

                          {Object.entries(MASTERY).map(([k,m]) => (
                            <button key={k} onClick={() => setItems(p=>p.map(i=>i.id===item.id?{...i,mastery:k}:i))} style={{ padding: '4px 12px', borderRadius: 20, border: '1px solid', fontSize: 11, fontWeight: 600, cursor: 'pointer', background: item.mastery===k?m.color+'30':'transparent', borderColor: item.mastery===k?m.color:'rgba(255,255,255,0.1)', color: item.mastery===k?m.color:'#555' }}>{m.label}</button>
                          ))}
                        </div>
                      )}

                      {expandedNotes[item.id] && (item.notes||(item.images&&item.images.length>0)) && (
                        <div style={{ marginTop: 10, paddingTop: 10, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                          {item.notes && <div style={{ fontSize: 13, color: '#c8bfa8', lineHeight: 1.7, whiteSpace: 'pre-wrap', marginBottom: item.images&&item.images.length?12:0 }}>{item.notes}</div>}
                          {item.images&&item.images.length>0 && <ImageGallery images={item.images} />}
                        </div>
                      )}
                      {!item.notes&&!(item.images&&item.images.length>0) && (
                        <button onClick={() => setEditing(item)} style={{ marginTop: 8, fontSize: 11, color: '#555', background: 'transparent', border: 'none', cursor: 'pointer', padding: 0 }}>+ Ajouter des notes ou photos</button>
                      )}
                    </div>
                  )}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({ sessions, setSessions }) {
  const now = new Date();
  const [vm, setVm] = useState(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  const [absent, setAbsent] = useState(null);
  const [selected, setSelected] = useState(null);
  const [year, month] = vm.split('-').map(Number);
  const firstDay = new Date(year,month-1,1).getDay();
  const daysInMonth = new Date(year,month,0).getDate();
  const offset = (firstDay+6)%7;
  const days = [...Array(offset).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];

  const getS = d => d ? sessions.find(s=>s.date===`${vm}-${String(d).padStart(2,'0')}`) : null;
  const markAbsent = d => { const ds=`${vm}-${String(d).padStart(2,'0')}`; setSessions(p=>[...p.filter(s=>s.date!==ds),{date:ds,absent:true,catchupMin:10}]); setAbsent(null); };
  const prev = () => { const d=new Date(year,month-2,1); setVm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); };
  const next = () => { const d=new Date(year,month,1); setVm(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); };

  const totalWorked = sessions.filter(s=>s.validated).length;
  const totalMin = sessions.filter(s=>s.validated).reduce((a,s)=>a+(s.actualMin||0),0);

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <button onClick={prev} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'8px 16px', color:'#888', cursor:'pointer', fontSize:18 }}>‹</button>
        <div style={{ fontSize:18, color:'#f0e6d0', fontFamily:"'Playfair Display', serif", textTransform:'capitalize' }}>
          {new Date(year,month-1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}
        </div>
        <button onClick={next} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'8px 16px', color:'#888', cursor:'pointer', fontSize:18 }}>›</button>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, marginBottom:20 }}>
        {['L','M','M','J','V','S','D'].map((d,i)=><div key={i} style={{ textAlign:'center', fontSize:11, color:'#555', fontWeight:700, padding:'4px 0' }}>{d}</div>)}
        {days.map((d,i) => {
          if (!d) return <div key={i}/>;
          const dateStr=`${vm}-${String(d).padStart(2,'0')}`;
          const s=getS(d); const isToday=dateStr===TODAY; const isPast=dateStr<TODAY;
          let bg='rgba(255,255,255,0.03)', bc='rgba(255,255,255,0.07)', color='#666';
          if (s?.validated) { bg='rgba(92,186,125,0.15)'; bc='rgba(92,186,125,0.3)'; color='#5cba7d'; }
          else if (s?.joker) { bg='rgba(201,168,76,0.08)'; bc='rgba(201,168,76,0.2)'; color='#c9a84c'; }
          else if (s?.absent){ bg='rgba(224,92,92,0.1)'; bc='rgba(224,92,92,0.2)'; color='#e05c5c'; }
          else if (isToday)  { bg='rgba(201,168,76,0.1)'; bc='rgba(201,168,76,0.4)'; color='#c9a84c'; }
          return (
            <div key={i} onClick={() => { if(s&&(s.validated||s.absent||s.joker)) setSelected(d); else if(isPast&&!isToday&&!s) setAbsent(d); }}
              style={{ borderRadius:10, padding:'6px 4px', textAlign:'center', background:bg, border:`1px solid ${bc}`, cursor:(s&&(s.validated||s.absent||s.joker))||(isPast&&!s)?'pointer':'default', minHeight:46, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2 }}>
              <span style={{ fontSize:13, fontWeight:isToday?700:400, color }}>{d}</span>
              {s?.validated && <span style={{ fontSize:9, color:'#5cba7d', fontFamily:'monospace' }}>{s.actualMin}'</span>}
              {s?.absent    && <span style={{ fontSize:9, color:'#e05c5c' }}>abs</span>}
              {s?.joker     && <span style={{ fontSize:11 }}>🃏</span>}
            </div>
          );
        })}
      </div>

      {selected && (() => {
        const dateStr=`${vm}-${String(selected).padStart(2,'0')}`;
        const s=sessions.find(ss=>ss.date===dateStr);
        const dl=new Date(dateStr+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        return (
          <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:14, padding:18, marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, color:'#888', letterSpacing:1, textTransform:'uppercase', marginBottom:2 }}>Séance du</div>
                <div style={{ fontSize:15, color:'#f0e6d0', fontFamily:"'Playfair Display', serif", textTransform:'capitalize' }}>{dl}</div>
              </div>
              <button onClick={() => setSelected(null)} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:8, padding:'6px 12px', color:'#888', cursor:'pointer', fontSize:18 }}>×</button>
            </div>
            {s?.absent && <div style={{ display:'flex', alignItems:'center', gap:10, color:'#e05c5c' }}><span style={{fontSize:20}}>🚫</span><span>Jour non travaillé</span></div>}
            {s?.joker  && <div style={{ display:'flex', alignItems:'center', gap:10, color:'#c9a84c' }}><span style={{fontSize:24}}>🃏</span><div><div style={{fontWeight:700}}>Jour joker</div><div style={{fontSize:12,color:'#888',marginTop:2}}>Session annulée</div></div></div>}
            {s?.validated && s.blocks && (
              <>
                <div style={{ display:'flex', gap:10, marginBottom:14 }}>
                  <div style={{ background:'rgba(92,186,125,0.1)', border:'1px solid rgba(92,186,125,0.2)', borderRadius:10, padding:'8px 14px', flex:1, textAlign:'center' }}>
                    <div style={{ fontSize:20, fontWeight:700, color:'#5cba7d', fontFamily:'monospace' }}>{s.actualMin}'</div>
                    <div style={{ fontSize:10, color:'#555', letterSpacing:1 }}>TEMPS RÉEL</div>
                  </div>
                  <div style={{ background:'rgba(201,168,76,0.1)', border:'1px solid rgba(201,168,76,0.2)', borderRadius:10, padding:'8px 14px', flex:1, textAlign:'center' }}>
                    <div style={{ fontSize:20, fontWeight:700, color:'#c9a84c', fontFamily:'monospace' }}>{s.blocks.length}</div>
                    <div style={{ fontSize:10, color:'#555', letterSpacing:1 }}>BLOCS</div>
                  </div>
                </div>
                {s.blocks.map((block,i) => {
                  const cat=CATEGORIES[block.category]||CATEGORIES.gammes;
                  const m=block.validatedMastery&&MASTERY[block.validatedMastery];
                  return (
                    <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background:'rgba(255,255,255,0.03)', borderLeft:'3px solid '+cat.color, borderRadius:8, marginBottom:6 }}>
                      <span style={{fontSize:18}}>{cat.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:cat.color,fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:1}}>{cat.label}</div>
                        <div style={{fontSize:13,color:'#f0e6d0'}}>{block.title}</div>
                        {m&&<div style={{fontSize:11,color:m.color,marginTop:1}}>{m.label}</div>}
                      </div>
                      <div style={{fontSize:13,color:'#c9a84c',fontFamily:'monospace',fontWeight:700}}>{block.actualMin||block.plannedMin}'</div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        );
      })()}

      {absent && (
        <div style={{ background:'rgba(224,92,92,0.1)', border:'1px solid rgba(224,92,92,0.3)', borderRadius:12, padding:16, marginBottom:16 }}>
          <div style={{ color:'#f0e6d0', marginBottom:10 }}>Marquer le {absent} comme jour non travaillé ?</div>
          <div style={{ display:'flex', gap:10 }}>
            <button onClick={() => markAbsent(absent)} style={{ padding:'10px 18px', background:'#e05c5c', border:'none', borderRadius:10, color:'#fff', fontWeight:600, cursor:'pointer', fontSize:14 }}>Confirmer</button>
            <button onClick={() => setAbsent(null)} style={{ padding:'10px 18px', background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, color:'#888', cursor:'pointer', fontSize:14 }}>Annuler</button>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
        {[{label:'Sessions',value:totalWorked,icon:'📅'},{label:'Minutes',value:totalMin+"'",icon:'⏱'},{label:'Jokers',value:sessions.filter(s=>s.joker).length,icon:'🃏'}].map((s,i)=>(
          <div key={i} style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'14px 12px', textAlign:'center' }}>
            <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:22,fontWeight:700,color:'#c9a84c',fontFamily:'monospace'}}>{s.value}</div>
            <div style={{fontSize:11,color:'#555'}}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SETTINGS VIEW ────────────────────────────────────────────────────────────
function SettingsView({ settings, setSettings }) {
  const [form, setForm] = useState(settings);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const saveAndSchedule = () => {
    setSettings(form);
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'SCHEDULE_NOTIF',
        enabled: form.reminderEnabled,
        hour: form.reminderHour,
        minute: form.reminderMinute,
      });
    }
  };

  const requestNotifPermission = async () => {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') set('reminderEnabled', true);
  };

  return (
    <div>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Budgets hebdomadaires</div>
        {[
          {key:'gammesDailyMin',label:'🎼 Gammes (min/jour)',max:20},
          {key:'techJazzWeeklyMin',label:'🎨 Langage musical (min/semaine)',max:120},
          {key:'morceauxWeeklyMin',label:'🎵 Morceaux (min/semaine)',max:180},
          {key:'revisionsWeeklyMin',label:'🔁 Révisions (min/semaine)',max:60},
        ].map(({key,label,max}) => (
          <div key={key} style={{ marginBottom:16 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
              <label style={{ fontSize:13, color:'#f0e6d0' }}>{label}</label>
              <span style={{ fontSize:13, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>{form[key]} min</span>
            </div>
            <input type="range" min="5" max={max} step="5" value={form[key]} onChange={e=>set(key,parseInt(e.target.value))} style={{ width:'100%' }} />
          </div>
        ))}
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Rythme</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          {[{key:'workDaysPerWeek',label:'Jours de pratique / sem.',min:3,max:7},{key:'revisionDaysPerWeek',label:'Révisions / sem.',min:1,max:4}].map(({key,label,min,max})=>(
            <div key={key}>
              <label style={{ fontSize:12, color:'#888', display:'block', marginBottom:4 }}>{label}</label>
              <input type="number" min={min} max={max} value={form[key]} onChange={e=>set(key,parseInt(e.target.value))}
                style={{ width:'100%', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'12px 14px', color:'#f0e6d0', fontSize:16, fontFamily:'monospace', outline:'none' }} />
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:14 }}>Rappel quotidien 🔔</div>
        <div style={{ background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:16 }}>
          {Notification.permission !== 'granted' ? (
            <button onClick={requestNotifPermission} style={{ width:'100%', padding:'12px', background:'rgba(201,168,76,0.1)', border:'1px solid rgba(201,168,76,0.3)', borderRadius:10, color:'#c9a84c', fontWeight:600, fontSize:14, cursor:'pointer' }}>
              🔔 Autoriser les notifications
            </button>
          ) : (
            <>
              <label style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer', marginBottom:14 }}>
                <input type="checkbox" checked={form.reminderEnabled} onChange={e=>set('reminderEnabled',e.target.checked)} style={{ accentColor:'#c9a84c', width:18, height:18 }} />
                <span style={{ fontSize:14, color:'#f0e6d0' }}>Activer le rappel</span>
              </label>
              {form.reminderEnabled && (
                <div>
                  <label style={{ fontSize:12, color:'#888', display:'block', marginBottom:6 }}>Heure du rappel</label>
                  <input type="time" value={`${String(form.reminderHour).padStart(2,'0')}:${String(form.reminderMinute).padStart(2,'0')}`}
                    onChange={e => { const [h,m]=e.target.value.split(':'); set('reminderHour',parseInt(h)); set('reminderMinute',parseInt(m)); }}
                    style={{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:'10px 14px', color:'#f0e6d0', fontSize:16, outline:'none', fontFamily:'monospace' }} />
                </div>
              )}
            </>
          )}
        </div>
      </div>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:12, color:'#888', letterSpacing:2, textTransform:'uppercase', marginBottom:10 }}>Garde-fous</div>
        <div style={{ background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:12, padding:'14px 16px' }}>
          <div style={{ fontSize:13, color:'#f0e6d0', marginBottom:8 }}>Relance auto si non vu depuis :</div>
          {[{key:'priority',label:'⭐ Prioritaire',color:'#c9a84c'},{key:'normal',label:'— Normal',color:'#888'},{key:'occasional',label:'🌙 Occasionnel',color:'#7b9cdf'}].map(f=>(
            <div key={f.key} style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
              <span style={{ fontSize:12, color:f.color }}>{f.label}</span>
              <span style={{ fontSize:12, color:'#888', fontFamily:'monospace' }}>{MAX_DAYS_UNSEEN[f.key]} jours</span>
            </div>
          ))}
          <div style={{ fontSize:11, color:'#555', marginTop:8 }}>Cap session : {SESSION_MAX_MIN} min max</div>
        </div>
      </div>

      <button onClick={saveAndSchedule} style={{ width:'100%', padding:'14px', background:'#c9a84c', border:'none', borderRadius:12, color:'#1a1a18', fontWeight:700, fontSize:15, cursor:'pointer' }}>
        Enregistrer
      </button>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [items,    setItems,    il] = useStorage('pm_items',    DEFAULT_ITEMS);
  const [sessions, setSessions, sl] = useStorage('pm_sessions', []);
  const [settings, setSettings, stl] = useStorage('pm_settings', DEFAULT_SETTINGS);
  const [tab, setTab] = useState('today');

  // Schedule notification on load
  useEffect(() => {
    if (il && stl && settings.reminderEnabled && 'serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(sw => {
        sw.active && sw.active.postMessage({ type: 'SCHEDULE_NOTIF', enabled: true, hour: settings.reminderHour, minute: settings.reminderMinute });
      });
    }
  }, [il, stl]);

  if (!il || !sl || !stl) return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:36, marginBottom:12 }}>♩</div>
        <div style={{ color:'#c9a84c', fontFamily:'monospace', letterSpacing:2 }}>Chargement…</div>
      </div>
    </div>
  );

  const TABS = [{id:'today',label:"Aujourd'hui",icon:'🎯'},{id:'library',label:'Bibliothèque',icon:'📚'},{id:'calendar',label:'Calendrier',icon:'📅'},{id:'settings',label:'Réglages',icon:'⚙️'}];
  const weekSessions = sessions.filter(s=>s.validated&&s.weekKey===getWeekKey()).length;
  const weekJoker = sessions.some(s=>s.joker&&s.weekKey===getWeekKey());

  return (
    <div style={{ minHeight:'100vh', minHeight:'100dvh', background:'#1a1a18', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'20px 16px 0', borderBottom:'1px solid rgba(255,255,255,0.06)', background:'#1a1a18', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:16 }}>
          <div>
            <div style={{ fontSize:20, fontFamily:"'Playfair Display', serif", color:'#f0e6d0', lineHeight:1 }}>
              <em>Cadence</em> <span style={{ color:'#c9a84c' }}>♩</span>
            </div>
            <div style={{ fontSize:10, color:'#555', letterSpacing:2, textTransform:'uppercase', marginTop:2 }}>Journal de pratique</div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:10, color:'#555' }}>Cette semaine</div>
            <div style={{ fontSize:15, color:'#c9a84c', fontFamily:'monospace', fontWeight:700 }}>
              {weekSessions}<span style={{ fontSize:10, color:'#555', marginLeft:3 }}>sessions</span>
              {weekJoker && <span style={{ fontSize:13, marginLeft:5 }}>🃏</span>}
            </div>
          </div>
        </div>
        <div style={{ display:'flex' }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex:1, padding:'8px 2px', background:'transparent', border:'none', borderBottom:tab===t.id?'2px solid #c9a84c':'2px solid transparent', color:tab===t.id?'#c9a84c':'#555', cursor:'pointer', fontSize:10, fontWeight:600, letterSpacing:0.5 }}>
              <div style={{ fontSize:18, marginBottom:2 }}>{t.icon}</div>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, padding:'20px 16px 80px', overflowY:'auto' }}>
        {tab==='today'    && <TodayView    items={items} settings={settings} sessions={sessions} setSessions={setSessions} setItems={setItems} />}
        {tab==='library'  && <LibraryView  items={items} setItems={setItems} />}
        {tab==='calendar' && <CalendarView sessions={sessions} setSessions={setSessions} />}
        {tab==='settings' && <SettingsView settings={settings} setSettings={setSettings} />}
      </div>
    </div>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    const t   = sessionStorage.getItem('cadence_token');
    const exp = sessionStorage.getItem('cadence_expiry');
    if (t && exp && Date.now() < parseInt(exp) - 60000) {
      DriveDB.setToken(t);
      onAuth();
    }
  }, []);

  const signIn = () => {
    setLoading(true); setError(null);
    try {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: resp => {
          if (resp.error) { setError('Connexion échouée. Réessaie.'); setLoading(false); return; }
          DriveDB.setToken(resp.access_token);
          sessionStorage.setItem('cadence_token', resp.access_token);
          sessionStorage.setItem('cadence_expiry', String(Date.now() + resp.expires_in * 1000));
          onAuth();
        }
      });
      client.requestAccessToken({ prompt: '' });
    } catch(e) { setError('Google non disponible.'); setLoading(false); }
  };

  return (
    <div style={{ minHeight:'100vh', minHeight:'100dvh', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div style={{ textAlign:'center', maxWidth:300, width:'100%' }}>
        <div style={{ fontSize:72, marginBottom:12, lineHeight:1 }}>♩</div>
        <div style={{ fontSize:34, fontFamily:"'Playfair Display', serif", color:'#f0e6d0', marginBottom:6 }}><em>Cadence</em></div>
        <div style={{ fontSize:12, color:'#555', letterSpacing:2, textTransform:'uppercase', marginBottom:52 }}>Journal de pratique musicale</div>
        <button onClick={signIn} disabled={loading} style={{ width:'100%', padding:'16px 24px', background:loading?'rgba(255,255,255,0.04)':'#c9a84c', border:'none', borderRadius:16, color:loading?'#555':'#1a1a18', fontWeight:700, fontSize:16, cursor:loading?'default':'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:10 }}>
          <span>🔑</span>{loading?'Connexion…':'Se connecter avec Google'}
        </button>
        {error && <div style={{ marginTop:14, color:'#e05c5c', fontSize:13 }}>{error}</div>}
        <div style={{ marginTop:32, fontSize:11, color:'#444', lineHeight:1.7 }}>
          Tes données sont stockées dans ton Google Drive personnel.<br/>Personne d'autre n'y a accès.
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function AppWrapper() {
  const [authed, setAuthed] = useState(false);
  return authed ? <App /> : <AuthScreen onAuth={() => setAuthed(true)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper />);
